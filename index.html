function OptionsLab(){
  const[strategy,setStrategy]=useState("long_put");
  const[selected,setSelected]=useState(null);
  const[strike,setStrike]=useState(170);
  const[premium,setPremium]=useState(3.50);
  const[contracts,setContracts]=useState(1);
  const[sharesOwned,setSharesOwned]=useState(100);
  const[purchasePrice,setPurchasePrice]=useState(0);
  const[dte,setDte]=useState(30);
  const[iv,setIv]=useState(30);
  const[ivBase,setIvBase]=useState(30);
  const[ivLoading,setIvLoading]=useState(false);
  const[rfr,setRfr]=useState(5.0);
  const[priceLow,setPriceLow]=useState(0);
  const[priceHigh,setPriceHigh]=useState(0);
  const[priceRangeManual,setPriceRangeManual]=useState(false);
  const[chartView,setChartView]=useState("chart");
  const[showOptionsModal,setShowOptionsModal]=useState(false);
  const[chartSymbol,setChartSymbol]=useState(null);
  const[selectedContract,setSelectedContract]=useState(null);
  const[contractAction,setContractAction]=useState('buy'); // 'buy' | 'write'

  // Multi-leg state
  const[leg2Strike,setLeg2Strike]=useState(185);
  const[leg2Premium,setLeg2Premium]=useState(1.50);
  const[leg2Dte,setLeg2Dte]=useState(30);
  const[leg2Iv,setLeg2Iv]=useState(30);
  const[selectingLeg,setSelectingLeg]=useState(1);
  const[selectedContract2,setSelectedContract2]=useState(null);

  // Auto price range when strategy, stock price, or strike changes (if not manually overridden)
  const sp=selected?.price||0;
  useEffect(()=>{
    if(!sp||priceRangeManual) return;
    const{low,high}=autoRange(sp,strategy,strike);
    setPriceLow(low);
    setPriceHigh(high);
  },[sp,strategy,strike,priceRangeManual]);

  // Calendar spread: lock leg2 strike to leg1 strike
  useEffect(()=>{
    if(strategy==='calendar_spread') setLeg2Strike(strike);
  },[strategy,strike]);

  // Sync strategy when selected contract changes (e.g. after picking from chain)
  // Skip for multi-leg strategies — leg selection must not override the parent strategy
  useEffect(()=>{
    if(!selectedContract) return;
    if(MULTI_LEG.includes(strategy)) return;
    setStrategy(deriveStrategy(contractAction, selectedContract.side));
  },[selectedContract, strategy]);

  const handleOptionSelect=useCallback((opt)=>{
    if(MULTI_LEG.includes(strategy)){
      if(selectingLeg===1){
        setStrike(opt.strike);
        const mktPrice=parseFloat((opt.mid??opt.ask??0).toFixed(2));
        setPremium(mktPrice);
        setDte(opt.dte??30);
        if(opt.iv&&opt.iv>0.005){const r=Math.round(opt.iv*100*10)/10;setIv(r);setIvBase(r);}
        setSelectedContract(opt);
      } else {
        if(strategy!=='calendar_spread') setLeg2Strike(opt.strike);
        const mktPrice=parseFloat((opt.mid??opt.ask??0).toFixed(2));
        setLeg2Premium(mktPrice);
        setLeg2Dte(opt.dte??30);
        if(opt.iv&&opt.iv>0.005){const r=Math.round(opt.iv*100*10)/10;setLeg2Iv(r);}
        setSelectedContract2(opt);
      }
      setShowOptionsModal(false);
      return;
    }
    const derived=deriveStrategy(contractAction, opt.side);
    setStrategy(derived);
    setStrike(opt.strike);
    const mktPrice=parseFloat((opt.mid??opt.ask??0).toFixed(2));
    setPremium(mktPrice);
    const daysLeft=opt.dte??30;
    setDte(daysLeft);

    // IV: use API value if valid, otherwise back-calculate from market price
    if(opt.iv!=null && opt.iv>0.005){
      const rounded=Math.round(opt.iv*100*10)/10;
      setIv(rounded);setIvBase(rounded);
    } else if(mktPrice>0 && sp>0){
      const T=daysLeft/365;
      const side=opt.side==='call'?'call':'put';
      const calcIV=impliedVol(mktPrice, sp, opt.strike, T, rfr/100, side);
      const rounded=Math.round(calcIV*100*10)/10;
      setIv(rounded);setIvBase(rounded);
    }

    setSelectedContract(opt);
    // Always auto-recalculate range when a contract is freshly selected, including strike
    if(sp){
      const{low,high}=autoRange(sp,derived,opt.strike);
      setPriceLow(low);
      setPriceHigh(high);
      setPriceRangeManual(false);
    }
  },[contractAction, selectingLeg, strategy, sp, rfr]);

  // API call tracking
  const tracker=useCallTracker();
  const[toasts,setToasts]=useState([]);
  const prevStatus=useRef('ok');

  const addToast=useCallback((icon,title,msg)=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,icon,title,msg,out:false}]);
    setTimeout(()=>setToasts(t=>t.map(x=>x.id===id?{...x,out:true}:x)),6000);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),6350);
  },[]);

  const handleApiCall=useCallback((endpoint)=>{
    tracker.increment(endpoint);
  },[tracker.increment]);

  // Fire toasts when threshold is crossed
  useEffect(()=>{
    if(tracker.status==='warn'&&prevStatus.current==='ok'){
      addToast('⚠️','Approaching API Limit',
        `${tracker.count} of ${tracker.limit} daily calls used (${Math.round(tracker.pct)}%). Consider upgrading your plan.`);
    }
    if(tracker.status==='over'&&prevStatus.current!=='over'){
      addToast('🚨','Daily API Limit Reached',
        `${tracker.count} calls made today. Free tier limit is ${tracker.limit}/day. Requests may start failing.`);
    }
    prevStatus.current=tracker.status;
  },[tracker.status,tracker.count]);

  const st=STRATS[strategy];
  const params={strike,premium,contracts,sharesOwned,stockPrice:sp,purchasePrice:purchasePrice||sp,iv,rfr,
    leg2Strike,leg2Premium,leg2Iv,leg2Dte,dte};
  const n=contracts*100;

  const summary=useMemo(()=>{
    if(!sp)return null;
    let mp,ml,be;
    if(strategy==="long_call")          {mp="∞";ml=(premium*n).toFixed(2);be=(strike+premium).toFixed(2);}
    else if(strategy==="long_put")      {mp=((strike-premium)*n).toFixed(2);ml=(premium*n).toFixed(2);be=(strike-premium).toFixed(2);}
    else if(strategy==="covered_call")  {const cb=purchasePrice||sp;mp=((strike-cb+premium)*n).toFixed(2);ml=((cb-premium)*n).toFixed(2);be=(cb-premium).toFixed(2);}
    else if(strategy==="cash_secured_put"){mp=(premium*n).toFixed(2);ml=((strike-premium)*n).toFixed(2);be=(strike-premium).toFixed(2);}
    else if(strategy==="call_spread")   {const nd=premium-leg2Premium;mp=((leg2Strike-strike-nd)*n).toFixed(2);ml=(nd*n).toFixed(2);be=(strike+nd).toFixed(2);}
    else if(strategy==="put_spread")    {const nd=premium-leg2Premium;mp=((strike-leg2Strike-nd)*n).toFixed(2);ml=(nd*n).toFixed(2);be=(strike-nd).toFixed(2);}
    else if(strategy==="pmcc")          {const nd=premium-leg2Premium;mp=((leg2Strike-strike)*n).toFixed(2);ml=(nd*n).toFixed(2);be=(strike+nd).toFixed(2);}
    else if(strategy==="calendar_spread"){const nd=premium-leg2Premium;mp="varies";ml=(Math.max(nd,0)*n).toFixed(2);be="≈strike";}
    else                                {mp="0";ml="0";be="0";}
    return{mp,ml,be,cur:pnl(strategy,params,sp,dte)};
  },[strategy,sp,strike,premium,n,dte,params,purchasePrice,leg2Strike,leg2Premium]);

  const greeks=useMemo(()=>{
    if(!sp)return null;
    const isML=MULTI_LEG.includes(strategy);
    if(!isML){
      return bsGreeks(sp,strike,dte/365,rfr/100,iv/100,strategy.includes("call")?"call":"put");
    }
    // Multi-leg: sum greeks of both legs (long leg1, short leg2)
    const side1=strategy==='put_spread'?'put':'call';
    const side2=strategy==='put_spread'?'put':'call';
    const g1=bsGreeks(sp,strike,dte/365,rfr/100,iv/100,side1);
    const leg2T=(strategy==='calendar_spread'||strategy==='pmcc')?Math.max((dte+(dte-leg2Dte))/365,0):dte/365;
    const g2=bsGreeks(sp,leg2Strike,leg2T,rfr/100,(leg2Iv||iv)/100,side2);
    return{
      delta:g1.delta-g2.delta,
      gamma:g1.gamma-g2.gamma,
      theta:g1.theta-g2.theta,
      vega:g1.vega-g2.vega,
      rho:g1.rho-g2.rho,
    };
  },[sp,strategy,strike,leg2Strike,dte,leg2Dte,iv,leg2Iv,rfr]);

  const metrics=summary?[
    {label:"Max Profit", val:summary.mp==="∞"?"∞":summary.mp==="varies"?"varies":`$${summary.mp}`, color:"var(--green)", bar:"var(--green)", sub:"Best case at expiry"},
    {label:"Max Loss",   val:summary.ml==="varies"?"varies":`-$${summary.ml}`,                      color:"var(--red)",   bar:"var(--red)",   sub:(strategy==="covered_call"||strategy==="cash_secured_put")?`Stock falls to zero · ${contracts} contract${contracts!==1?"s":""}`:MULTI_LEG.includes(strategy)?`Net debit · ${contracts} contract${contracts!==1?"s":""}`:`Premium paid · ${contracts} contract${contracts!==1?"s":""}`},
    {label:"Breakeven",  val:summary.be==="≈strike"?"≈strike":`$${summary.be}`,                    color:"var(--amber)", bar:"var(--amber)", sub:"At expiry only — not before"},
    {label:"Current P&L",val:`${summary.cur>=0?"+":""}$${Math.abs(summary.cur).toFixed(2)}`,
      color:summary.cur>=0?"var(--green)":"var(--red)",
      bar:summary.cur>=0?"var(--green)":"var(--red)",
      sub:"Mark-to-market today"},
  ]:[];

  const greekDefs=greeks?[
    {l:"Delta",v:greeks.delta.toFixed(4),c:"#2563EB",hint:"Price sensitivity"},
    {l:"Gamma",v:greeks.gamma.toFixed(6),c:"#7C3AED",hint:"Delta change rate"},
    {l:"Theta",v:greeks.theta.toFixed(4),c:"#EA580C",hint:"Daily time decay"},
    {l:"Vega", v:greeks.vega.toFixed(4), c:"#0891B2",hint:"IV sensitivity"},
    {l:"Rho",  v:greeks.rho.toFixed(4),  c:"#BE185D",hint:"Rate sensitivity"},
  ]:[];

  return(
    <div className="app">
      <style>{CSS}</style>

      {/* ── Header ── */}
      <header className="hdr">
        <div className="logo-wrap">
          <div className="logo-mark">OL</div>
          <div>
            <div className="logo-name">OptionsLab</div>
            <div className="logo-sub">Professional Options Calculator</div>
          </div>
        </div>
        <div className="hdr-right">
          <div className="live-pill"><div className="live-dot"/>Live Data</div>
          <a href="#suggest" className="suggest-btn" onClick={e=>{e.preventDefault();document.getElementById('suggest').scrollIntoView({behavior:'smooth'})}}>
            ✉ Suggest a Feature
          </a>
          {/* API call counter */}
          <div className={`call-counter${tracker.status==='warn'?' warn':tracker.status==='over'?' over':''}`}
            title={`${tracker.count} of ${tracker.limit} API calls used today. Resets at midnight.\nLast: ${tracker.history.length?new Date(tracker.history[tracker.history.length-1].time).toLocaleTimeString():'—'}`}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <span>{tracker.count}<span style={{opacity:.5}}>/{tracker.limit}</span></span>
            <div className="call-bar-wrap">
              <div className="call-bar" style={{
                width:`${tracker.pct}%`,
                background:tracker.status==='over'?'var(--red)':tracker.status==='warn'?'var(--amber)':'var(--green)'
              }}/>
            </div>
            {tracker.count>0&&(
              <button onClick={e=>{e.stopPropagation();tracker.reset();}}
                title="Reset counter"
                style={{background:'none',border:'none',cursor:'pointer',color:'inherit',opacity:.5,fontSize:11,padding:0,lineHeight:1}}>↺</button>
            )}
          </div>
          <span className="hdr-meta">Powered by <b>Finnhub</b></span>
        </div>
      </header>
      <ToastStack toasts={toasts} onDismiss={id=>setToasts(t=>t.filter(x=>x.id!==id))}/>

      {/* Options chain modal */}
      {chartSymbol&&<ChartModal symbol={chartSymbol} onClose={()=>setChartSymbol(null)}/>}

      {showOptionsModal&&selected&&(
        <OptionsChainModal
          symbol={selected.symbol}
          stockPrice={selected.price}
          strategy={strategy}
          legBuying={MULTI_LEG.includes(strategy)?selectingLeg===1:undefined}
          onSelect={handleOptionSelect}
          onClose={()=>setShowOptionsModal(false)}
          onCall={handleApiCall}/>
      )}

      {/* ── Strategy bar ── */}
      <div className="strat-bar">
        {Object.entries(STRATS).map(([k,s])=>{
          const active=strategy===k;
          return(
            <button key={k} className={`sbtn${active?' active':''}`}
              onClick={()=>{
                setStrategy(k);
                setContractAction(['covered_call','cash_secured_put'].includes(k)?'write':'buy');
                setPriceRangeManual(false);
                setSelectedContract(null);
                setSelectedContract2(null);
                setSelectingLeg(1);
              }}
              style={{color:active?s.accent:'var(--t3)'}}>
              <span style={{fontSize:16}}>{s.icon}</span>
              <span style={{fontSize:13,fontWeight:700}}>{s.name}</span>
              <span className="stag" style={{background:s.tagBg,color:s.tagC}}>{s.tag}</span>
            </button>
          );
        })}
      </div>
      <div className="strat-desc">
        <span style={{fontWeight:600,color:st.accent}}>{st.name}:</span>{' '}{st.desc}
      </div>

      {/* ── Page ── */}
      <div className="page">

        {/* ── Sidebar ── */}
        <aside className="sidebar">

          {/* Stock Search */}
          <StockSearch
            onSelect={s=>{
              setSelected(s);
              setStrike(Math.round(s.price*.95));
              setPurchasePrice(s.price);
              const{low,high}=autoRange(s.price,strategy);
              setPriceLow(low);
              setPriceHigh(high);
              setPriceRangeManual(false);
              setSelectedContract(null);
              // Fetch real ATM IV from market
              setIvLoading(true);
              handleApiCall('atm-iv');
              fetch(`/api/atm-iv?symbol=${encodeURIComponent(s.symbol)}&price=${s.price}`)
                .then(r=>r.ok?r.json():null)
                .then(d=>{
                  if(d?.iv>0){
                    const rounded=Math.round(d.iv*100*10)/10;
                    setIv(rounded);setIvBase(rounded);
                  }
                })
                .catch(()=>{})
                .finally(()=>setIvLoading(false));
            }}
            selected={selected}
            onCall={handleApiCall}
            onChart={sym=>setChartSymbol(sym)}/>

          {/* Long Call / Long Put / Cash-Secured Put — compact card */}
          {selected&&(strategy==='long_call'||strategy==='long_put'||strategy==='cash_secured_put')&&(()=>{
            const st=STRATS[strategy];
            const isBuy=strategy!=='cash_secured_put';
            const optLabel=strategy==='long_call'?'Call Option':'Put Option';
            const chainSVG=<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>;
            return(
              <div className="card fu1" style={{overflow:'hidden'}}>
                <div style={{padding:'10px 15px 9px',borderBottom:'1px solid var(--brd)',background:st.tagBg}}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <span style={{fontSize:14,lineHeight:1}}>{st.icon}</span>
                    <span style={{fontSize:12.5,fontWeight:700,color:st.accent,letterSpacing:'-.01em'}}>{st.name}</span>
                    <span style={{marginLeft:'auto',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',padding:'2px 7px',borderRadius:4,background:'rgba(0,0,0,.06)',color:st.tagC}}>{st.tag}</span>
                  </div>
                  <p style={{margin:'5px 0 0',fontSize:11,color:'var(--t2)',lineHeight:1.5}}>{LEG_INTENT[strategy]}</p>
                </div>
                <div style={{padding:'13px 15px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:6}}>
                    <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--t2)'}}>{optLabel}</span>
                    <span style={{fontSize:8,fontWeight:800,padding:'1px 5px',borderRadius:3,
                      background:isBuy?'var(--blue-bg)':'var(--red-bg)',
                      color:isBuy?'var(--blue)':'var(--red)',
                      border:`1px solid ${isBuy?'var(--blue-brd)':'var(--red-brd)'}`,
                      textTransform:'uppercase',letterSpacing:'.05em'}}>{isBuy?'BUY':'SELL'}</span>
                  </div>
                  <button className="opt-select-btn" style={{marginTop:0,padding:'5px 10px',fontSize:11,whiteSpace:'nowrap'}} onClick={()=>setShowOptionsModal(true)}>
                    {chainSVG}{selectedContract?'Change':'Select Option'}
                  </button>
                  <ContractBadge contract={selectedContract} onClear={()=>setSelectedContract(null)}/>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:8}}>
                    <CField label="Strike" value={strike} onChange={setStrike} prefix="$" step={.5}/>
                    <CField label="Premium" value={premium} onChange={setPremium} prefix="$" step={.05}/>
                  </div>
                  <div style={{borderTop:'1px solid var(--brd)',marginTop:12,paddingTop:10,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <CField label="DTE" value={dte} onChange={setDte} suffix="days" step={1} min={0}/>
                    <CField label="IV" value={iv} onChange={setIv} suffix="%" step={0.1} min={0.1}/>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Covered Call — two-column: stock ownership + short call */}
          {selected&&strategy==='covered_call'&&(()=>{
            const st=STRATS.covered_call;
            const chainSVG=<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>;
            return(
              <div className="card fu1" style={{overflow:'hidden'}}>
                <div style={{padding:'10px 15px 9px',borderBottom:'1px solid var(--brd)',background:st.tagBg}}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <span style={{fontSize:14,lineHeight:1}}>{st.icon}</span>
                    <span style={{fontSize:12.5,fontWeight:700,color:st.accent,letterSpacing:'-.01em'}}>{st.name}</span>
                    <span style={{marginLeft:'auto',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',padding:'2px 7px',borderRadius:4,background:'rgba(0,0,0,.06)',color:st.tagC}}>{st.tag}</span>
                  </div>
                  <p style={{margin:'5px 0 0',fontSize:11,color:'var(--t2)',lineHeight:1.5}}>{LEG_INTENT.covered_call}</p>
                </div>
                <div style={{padding:'13px 15px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 14px'}}>
                    {/* Left: stock ownership */}
                    <div>
                      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:6}}>
                        <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--t2)'}}>Shares Owned</span>
                        <span style={{fontSize:8,fontWeight:800,padding:'1px 5px',borderRadius:3,background:'var(--green-bg)',color:'var(--green)',border:'1px solid var(--green-brd)',textTransform:'uppercase',letterSpacing:'.05em'}}>LONG</span>
                      </div>
                      <CField label="Purchase Price" value={purchasePrice} onChange={setPurchasePrice} prefix="$" step={.01}/>
                      <div className="field" style={{marginTop:6}}>
                        <label className="flabel" style={{fontSize:9.5}}>Shares Owned</label>
                        <div className="inp-wrap">
                          <span className="inp-pfx">#</span>
                          <input type="number" className="inp" value={sharesOwned} min={1} step={1}
                            onChange={e=>{const v=Math.max(1,parseInt(e.target.value)||1);setSharesOwned(v);setContracts(Math.max(1,Math.floor(v/100)));}}
                            style={{padding:'6px 10px',fontSize:12.5,paddingLeft:22}}/>
                        </div>
                        <div style={{fontSize:9,color:'var(--t4)',marginTop:2}}>1 Contract = 100 Shares</div>
                      </div>
                      {purchasePrice>0&&sp>0&&(
                        <div style={{marginTop:7,fontSize:11,fontFamily:'var(--mono)',padding:'5px 8px',borderRadius:6,
                          background:sp>=purchasePrice?'var(--green-bg)':'var(--red-bg)',
                          border:`1px solid ${sp>=purchasePrice?'var(--green-brd)':'var(--red-brd)'}`,
                          color:sp>=purchasePrice?'var(--green)':'var(--red)',fontWeight:600}}>
                          {sp>=purchasePrice?'+':''}{((sp-purchasePrice)*sharesOwned).toFixed(2)} ({sp>=purchasePrice?'+':''}{((sp/purchasePrice-1)*100).toFixed(1)}%)
                        </div>
                      )}
                    </div>
                    {/* Right: short call */}
                    <div style={{borderLeft:'1px solid var(--brd)',paddingLeft:14}}>
                      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:6}}>
                        <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--t2)'}}>Short Call</span>
                        <span style={{fontSize:8,fontWeight:800,padding:'1px 5px',borderRadius:3,background:'var(--red-bg)',color:'var(--red)',border:'1px solid var(--red-brd)',textTransform:'uppercase',letterSpacing:'.05em'}}>SELL</span>
                      </div>
                      <button className="opt-select-btn" style={{marginTop:0,padding:'5px 10px',fontSize:11,whiteSpace:'nowrap'}} onClick={()=>setShowOptionsModal(true)}>
                        {chainSVG}{selectedContract?'Change':'Select Option'}
                      </button>
                      <ContractBadge contract={selectedContract} onClear={()=>setSelectedContract(null)}/>
                      <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:7}}>
                        <CField label="Strike" value={strike} onChange={setStrike} prefix="$" step={.5}/>
                        <CField label="Premium" value={premium} onChange={setPremium} prefix="$" step={.05}/>
                      </div>
                    </div>
                  </div>
                  <div style={{borderTop:'1px solid var(--brd)',marginTop:12,paddingTop:10,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <CField label="DTE" value={dte} onChange={setDte} suffix="days" step={1} min={0}/>
                    <CField label="IV" value={iv} onChange={setIv} suffix="%" step={0.1} min={0.1}/>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Multi-leg: Combined compact card */}
          {selected&&MULTI_LEG.includes(strategy)&&(()=>{
            const dualDte=strategy==='pmcc'||strategy==='calendar_spread';
            const inpSm={padding:'6px 10px',fontSize:12.5};
            const leg=(label,isBuy,selectBtn,badge,strikeVal,strikeSet,premVal,premSet,disabled)=>(
              <div>
                <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:6}}>
                  <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--t2)'}}>{label}</span>
                  <span style={{fontSize:8,fontWeight:800,padding:'1px 5px',borderRadius:3,
                    background:isBuy?'var(--blue-bg)':'var(--red-bg)',
                    color:isBuy?'var(--blue)':'var(--red)',
                    border:`1px solid ${isBuy?'var(--blue-brd)':'var(--red-brd)'}`,
                    textTransform:'uppercase',letterSpacing:'.05em'}}>{isBuy?'BUY':'SELL'}</span>
                </div>
                <button className="opt-select-btn" style={{marginTop:0,padding:'5px 10px',fontSize:11,whiteSpace:'nowrap'}} onClick={selectBtn}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
                  </svg>
                  {badge?'Change':'Select'}
                </button>
                {badge}
                <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:7}}>
                  <div className="field">
                    <label className="flabel" style={{fontSize:9.5}}>Strike</label>
                    <div className="inp-wrap">
                      <span className="inp-pfx">$</span>
                      <input type="number" className="inp" value={strikeVal} step={.5}
                        style={{...inpSm,paddingLeft:22}} disabled={disabled}
                        onChange={e=>strikeSet(parseFloat(e.target.value)||0)}/>
                    </div>
                  </div>
                  <div className="field">
                    <label className="flabel" style={{fontSize:9.5}}>Premium</label>
                    <div className="inp-wrap">
                      <span className="inp-pfx">$</span>
                      <input type="number" className="inp" value={premVal} step={.05} min={0}
                        style={{...inpSm,paddingLeft:22}}
                        onChange={e=>premSet(parseFloat(e.target.value)||0)}/>
                    </div>
                  </div>
                </div>
              </div>
            );
            const st=STRATS[strategy];
            return(
              <div className="card fu1" style={{overflow:'hidden'}}>
                {/* Title bar */}
                <div style={{padding:'10px 15px 9px',borderBottom:'1px solid var(--brd)',background:st.tagBg}}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <span style={{fontSize:14,lineHeight:1}}>{st.icon}</span>
                    <span style={{fontSize:12.5,fontWeight:700,color:st.accent,letterSpacing:'-.01em'}}>{st.name}</span>
                    <span style={{marginLeft:'auto',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',padding:'2px 7px',borderRadius:4,background:'rgba(0,0,0,.06)',color:st.tagC}}>{st.tag}</span>
                  </div>
                  <p style={{margin:'5px 0 0',fontSize:11,color:'var(--t2)',lineHeight:1.5}}>{LEG_INTENT[strategy]}</p>
                </div>
                <div style={{padding:'13px 15px'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 14px'}}>
                  {leg(
                    LEG_LABELS[strategy]?.[0]||'Leg 1', true,
                    ()=>{setSelectingLeg(1);setShowOptionsModal(true);},
                    selectedContract&&<ContractBadge contract={selectedContract} onClear={()=>setSelectedContract(null)}/>,
                    strike, setStrike, premium, setPremium, false
                  )}
                  <div style={{borderLeft:'1px solid var(--brd)',paddingLeft:14}}>
                    {leg(
                      LEG_LABELS[strategy]?.[1]||'Leg 2', false,
                      ()=>{setSelectingLeg(2);setShowOptionsModal(true);},
                      selectedContract2&&<ContractBadge contract={selectedContract2} onClear={()=>setSelectedContract2(null)}/>,
                      leg2Strike,
                      strategy==='calendar_spread'?()=>{}:setLeg2Strike,
                      leg2Premium, setLeg2Premium,
                      strategy==='calendar_spread'
                    )}
                  </div>
                </div>
                <div style={{borderTop:'1px solid var(--brd)',marginTop:12,paddingTop:10,display:'grid',gridTemplateColumns:dualDte?'1fr 1fr 1fr':'1fr 1fr',gap:10}}>
                  {dualDte?(
                    <>
                      <div className="field">
                        <label className="flabel" style={{fontSize:9.5}}>Leg 1 DTE</label>
                        <div className="inp-wrap">
                          <input type="number" className="inp" value={dte} step={1} min={0}
                            style={{...inpSm,paddingRight:38}}
                            onChange={e=>setDte(parseFloat(e.target.value)||0)}/>
                          <span className="inp-sfx" style={{fontSize:10}}>days</span>
                        </div>
                      </div>
                      <div className="field">
                        <label className="flabel" style={{fontSize:9.5}}>Leg 2 DTE</label>
                        <div className="inp-wrap">
                          <input type="number" className="inp" value={leg2Dte} step={1} min={0}
                            style={{...inpSm,paddingRight:38}}
                            onChange={e=>setLeg2Dte(parseFloat(e.target.value)||0)}/>
                          <span className="inp-sfx" style={{fontSize:10}}>days</span>
                        </div>
                      </div>
                    </>
                  ):(
                    <div className="field">
                      <label className="flabel" style={{fontSize:9.5}}>DTE</label>
                      <div className="inp-wrap">
                        <input type="number" className="inp" value={dte} step={1} min={0}
                          style={{...inpSm,paddingRight:38}}
                          onChange={e=>setDte(parseFloat(e.target.value)||0)}/>
                        <span className="inp-sfx" style={{fontSize:10}}>days</span>
                      </div>
                    </div>
                  )}
                  <div className="field">
                    <label className="flabel" style={{fontSize:9.5}}>IV</label>
                    <div className="inp-wrap">
                      <input type="number" className="inp" value={iv} step={0.1} min={0.1}
                        style={{...inpSm,paddingRight:28}}
                        onChange={e=>{const v=parseFloat(e.target.value)||0;setIv(v);setLeg2Iv(v);}}/>
                      <span className="inp-sfx" style={{fontSize:10}}>%</span>
                    </div>
                  </div>
                </div>
                {(()=>{
                  const net=parseFloat((premium-leg2Premium).toFixed(2));
                  const isDebit=net>0;
                  const isCredit=net<0;
                  if(!isDebit&&!isCredit) return null;
                  const color=isDebit?'var(--red)':'var(--green)';
                  const bg=isDebit?'var(--red-bg)':'var(--green-bg)';
                  const brd=isDebit?'var(--red-brd)':'var(--green-brd)';
                  const label=isDebit?'Net Debit':'Net Credit';
                  const desc=isDebit
                    ?`You pay $${Math.abs(net).toFixed(2)}/share ($${(Math.abs(net)*100).toFixed(0)}/contract) to enter`
                    :`You collect $${Math.abs(net).toFixed(2)}/share ($${(Math.abs(net)*100).toFixed(0)}/contract) to enter`;
                  return(
                    <div style={{marginTop:10,padding:'7px 10px',borderRadius:7,background:bg,border:`1px solid ${brd}`,display:'flex',alignItems:'baseline',gap:7}}>
                      <span style={{fontSize:11,fontWeight:800,fontFamily:'var(--mono)',color}}>{label}: ${Math.abs(net).toFixed(2)}</span>
                      <span style={{fontSize:10,color:'var(--t3)',lineHeight:1.4}}>{desc}</span>
                    </div>
                  );
                })()}
                </div>{/* end inner padding */}
              </div>
            );
          })()}


          {/* Parameters */}
          <div className="card cp fu2">
            <div className="slabel">Parameters</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <PInput label="Contracts" value={contracts} onChange={v=>{setContracts(v);if(strategy==='covered_call')setSharesOwned(v*100);}} step={1} min={1}/>
              <PInput label="Risk-Free" value={rfr} onChange={setRfr} suffix="%" step={.25}/>
              <div style={{borderTop:"1px solid var(--brd-lt)",paddingTop:10,marginTop:2}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <span className="flabel">Price Range (Chart &amp; Table)</span>
                  {priceRangeManual&&sp>0&&(
                    <button onClick={()=>{setPriceRangeManual(false);const{low,high}=autoRange(sp,strategy,strike);setPriceLow(low);setPriceHigh(high);}}
                      style={{fontSize:10,color:"var(--blue)",background:"none",border:"none",cursor:"pointer",fontWeight:600,padding:0}}>
                      ↺ Auto
                    </button>
                  )}
                  {!priceRangeManual&&<span style={{fontSize:9.5,color:"var(--green)",fontWeight:600}}>Auto</span>}
                </div>
                <div className="price-range-row">
                  <PInput label="Low $" value={priceLow}
                    onChange={v=>{setPriceLow(v);setPriceRangeManual(true);}}
                    prefix="$" step={.5} min={0.01}/>
                  <PInput label="High $" value={priceHigh}
                    onChange={v=>{setPriceHigh(v);setPriceRangeManual(true);}}
                    prefix="$" step={.5} min={0.01}/>
                </div>
              </div>
            </div>
          </div>

        </aside>

        {/* ── Main ── */}
        <main className="main-stack">

          {!selected?(
            <div className="empty">
              <div className="empty-icon">📈</div>
              <h2 className="empty-h">Analyze Any Options Strategy</h2>
              <p className="empty-p">
                Enter a stock ticker to instantly see P&L projections, Greeks, breakeven
                prices, and an interactive payoff diagram — powered by live market data.
              </p>
              <div className="step-list">
                {[
                  "Search for any US-listed stock or ETF by name or ticker",
                  "Choose a strategy — Long Call, Long Put, Covered Call, or Cash-Secured Put",
                  "Adjust parameters and read your P&L chart and Greeks instantly",
                ].map((step,i)=>(
                  <div key={i} className="step-row">
                    <div className="step-n">{i+1}</div>
                    {step}
                  </div>
                ))}
              </div>
            </div>
          ):summary&&(
            <>
              {/* Metrics */}
              <div className="metrics fu">
                {metrics.map((m,i)=>(
                  <div key={i} className="mc">
                    <div className="mc-bar" style={{background:m.bar}}/>
                    <div className="mc-label">{m.label}</div>
                    <div className="mc-val" style={{color:m.color}}>{m.val}</div>
                    <div className="mc-sub">{m.sub}</div>
                  </div>
                ))}
              </div>

              {/* Greeks */}
              {greeks&&(
                <div className="greeks fu1">
                  {greekDefs.map((g,i)=>(
                    <div key={i} className="gc">
                      <div className="gc-label" style={{color:g.c}}>{g.l}</div>
                      <div className="gc-val">{g.v}</div>
                      <div className="gc-hint">{g.hint}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* Chart / Heatmap */}
              <div className="card fu2">
                <div className="chart-hd">
                  <div>
                    <div className="chart-title">
                      P&L Over Time —{" "}
                      <span style={{color:st.accent}}>{st.name}</span>
                    </div>
                    <div className="chart-sub">
                      {chartView==="chart"
                        ?"Hover anywhere on the chart to inspect P&L at any stock price"
                        :"Color-coded P&L grid across price range × time slices. NOW row = current price."}
                      {" "}<span style={{color:"var(--amber)",fontSize:10.5,fontWeight:600}}>
                        Assumes constant IV — actual gains may be higher on large moves (vol expansion).
                      </span>
                    </div>
                  </div>
                  {/* ── Right controls: 2-row stack ── */}
                  <div style={{display:"flex",flexDirection:"column",gap:10,flexShrink:0}}>
                    {/* Row 1: Toggle + Badge */}
                    <div style={{display:"flex",gap:10}}>
                      <div className="view-toggle" style={{flex:1}}>
                        <button className={`vt-btn${chartView==="chart"?" active":""}`} onClick={()=>setChartView("chart")}>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                          </svg>
                          Chart
                        </button>
                        <button className={`vt-btn${chartView==="heatmap"?" active":""}`} onClick={()=>setChartView("heatmap")}>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                          </svg>
                          P&L Table
                        </button>
                      </div>
                      <div className="chart-badge" style={{width:128,flexShrink:0,flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,padding:"7px 10px"}}>
                        <span style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:800,letterSpacing:"-.02em",color:"var(--t1)",lineHeight:1.15}}>{selected.symbol}</span>
                        <span style={{fontFamily:"var(--mono)",fontSize:10.5,fontWeight:600,color:"var(--t2)",lineHeight:1.2}}>${sp.toFixed(2)}</span>
                      </div>
                    </div>
                    {/* Row 2: IV Adjuster */}
                    <div className="iv-control" style={{width:"100%",boxSizing:"border-box"}}>
                      <span className="iv-label" style={{display:"flex",alignItems:"center",gap:5}}>
                        Implied Vol
                        {ivLoading&&<div className="spin" style={{width:9,height:9,borderWidth:1.5}}/>}
                      </span>
                      <div className="iv-row">
                        <input
                          type="range"
                          className="iv-slider"
                          min={1} max={200} step={1}
                          value={iv}
                          style={{background:`linear-gradient(to right,var(--blue) ${(iv-1)/199*100}%,var(--brd) ${(iv-1)/199*100}%)`}}
                          onChange={e=>setIv(Number(e.target.value))}
                        />
                        <div className="iv-inp-wrap">
                          <input
                            type="number"
                            className="iv-inp"
                            min={1} max={200}
                            value={iv}
                            onChange={e=>{
                              const v=Math.min(200,Math.max(1,Number(e.target.value)));
                              if(!isNaN(v)&&e.target.value!=="")setIv(v);
                            }}
                          />
                          <span className="iv-sfx">%</span>
                        </div>
                      </div>
                      <div className="iv-divider"/>
                      <button
                        className="iv-reset-btn"
                        disabled={iv===ivBase||ivLoading}
                        onClick={()=>setIv(ivBase)}
                        title="Reset to market IV">↺</button>
                    </div>
                  </div>
                </div>
                {chartView==="chart"?(
                  <div style={{padding:"14px 0 0"}}>
                    <PnLChart strategy={strategy} params={params} dte={dte}
                      minPrice={priceLow} maxPrice={priceHigh}/>
                  </div>
                ):(
                  <div style={{padding:"12px 0 4px"}}>
                    {priceLow>0&&priceHigh>priceLow?(
                      <HeatMapTable strategy={strategy} params={params} dte={dte}
                        minPrice={priceLow} maxPrice={priceHigh}/>
                    ):(
                      <div style={{padding:"40px 22px",textAlign:"center",color:"var(--t3)",fontSize:13}}>
                        Set a Low $ and High $ price range in the Parameters panel to generate the P&L table.
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Table */}
              <div className="card fu3">
                <div className="chart-hd">
                  <div>
                    <div className="chart-title">P&L Scenarios — Price × Time</div>
                    <div className="chart-sub">How P&L changes at key time checkpoints across the price range</div>
                  </div>
                  <div style={{textAlign:"right",fontSize:11.5,color:"var(--t3)",fontFamily:"var(--mono)"}}>
                    Strike <span style={{color:st.accent,fontWeight:700}}>${strike.toFixed(2)}</span>
                    {" "}· {contracts} contract{contracts!==1?"s":""}
                    {" "}· ${(premium*n).toFixed(2)} total cost
                  </div>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table className="etbl">
                    <thead>
                      <tr>
                        <th>Stock Price</th>
                        <th title={`P&L at 20% into contract (~${Math.round(dte*0.8)}d remaining)`}>Early ({Math.round(dte*0.8)}d left)</th>
                        <th title={`P&L at halfway point (~${Math.round(dte*0.5)}d remaining)`}>Halfway ({Math.round(dte*0.5)}d left)</th>
                        <th>At Expiry</th>
                        <th>Return at Expiry</th>
                      </tr>
                    </thead>
                    <tbody>
                      {(()=>{
                        const bearish=strategy==='long_put'||strategy==='covered_call';
                        const lo=bearish?Math.max(strike*0.68,0.01):Math.max(sp*0.91,0.01);
                        const hi=bearish?sp*1.12:strike*1.32;
                        const N=18;
                        const rawStep=(hi-lo)/(N-1);
                        // Build price array then inject exact sp and strike
                        const prices=Array.from({length:N},(_,i)=>lo+rawStep*i);
                        // Inject exact current price
                        let closestIdx=0,closestDist=Infinity;
                        prices.forEach((p,i)=>{const d=Math.abs(p-sp);if(d<closestDist){closestDist=d;closestIdx=i;}});
                        prices[closestIdx]=sp;
                        // Inject exact strike price (only if in range and not overwriting sp slot)
                        if(strike>=lo&&strike<=hi){
                          let strikeIdx=0,strikeDist=Infinity;
                          prices.forEach((p,i)=>{const d=Math.abs(p-strike);if(d<strikeDist&&i!==closestIdx){strikeDist=d;strikeIdx=i;}});
                          prices[strikeIdx]=strike;
                        }
                        const basis=premium*n;
                        const d80=Math.round(dte*0.8);
                        const d50=Math.round(dte*0.5);
                        return prices.map((price,i)=>{
                          const totalExp=pnl(strategy,params,price,0);
                          const total80=pnl(strategy,params,price,d80);
                          const total50=pnl(strategy,params,price,d50);
                          const pct=basis>0?(totalExp/basis)*100:0;
                          const isCur=price===sp;
                          const isStrike=!isCur&&price===strike;
                          const fmtCell=(v)=>v>=0?`+$${v.toFixed(2)}`:`-$${Math.abs(v).toFixed(2)}`;
                          return(
                            <tr key={i} className={isCur?"cur":""}>
                              <td>
                                ${price.toFixed(2)}
                                {isCur&&<span style={{marginLeft:8,fontSize:9.5,fontWeight:700,color:"var(--blue)",background:"var(--blue-bg)",border:"1px solid var(--blue-brd)",padding:"1px 6px",borderRadius:4,verticalAlign:"middle"}}>NOW</span>}
                                {isStrike&&<span style={{marginLeft:8,fontSize:9.5,fontWeight:700,color:"var(--amber)",background:"var(--amber-bg)",border:"1px solid var(--amber-brd)",padding:"1px 6px",borderRadius:4,verticalAlign:"middle"}}>STRIKE</span>}
                              </td>
                              <td className={total80>=0?"pos":"neg"}>{fmtCell(total80)}</td>
                              <td className={total50>=0?"pos":"neg"}>{fmtCell(total50)}</td>
                              <td className={totalExp>=0?"pos":"neg"} style={{fontWeight:700}}>{fmtCell(totalExp)}</td>
                              <td className={pct>=0?"pos":"neg"}>{pct>=0?"+":""}{pct.toFixed(1)}%</td>
                            </tr>
                          );
                        });
                      })()}
                    </tbody>
                  </table>
                </div>
              </div>

            </>
          )}

        </main>
      </div>

      {/* ── Suggestion Section ── */}
      <SuggestionSection/>

      {/* ── Footer ── */}
      <footer style={{
        borderTop:"1px solid var(--brd)",marginTop:16,padding:"20px 40px",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        background:"var(--white)",
      }}>
        <div style={{fontSize:12,color:"var(--t4)"}}>
          © 2026 OptionsLab · For educational purposes only. Not financial advice.
        </div>
        <div style={{fontSize:12,color:"var(--t4)"}}>
          Live data via{" "}
          <a href="https://finnhub.io" target="_blank" rel="noreferrer"
            style={{color:"var(--blue)",fontWeight:600,textDecoration:"none"}}>Finnhub</a>
          {" "}· Black-Scholes pricing model
        </div>
      </footer>

    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<OptionsLab/>);
</script>
</body>
</html>
