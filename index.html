/* ─────────────────────────────────────────
   BLACK-SCHOLES
───────────────────────────────────────── */
function normalCDF(x) {
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign=x<0?-1:1,ax=Math.abs(x)/Math.sqrt(2);
  const t=1/(1+p*ax),y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-ax*ax);
  return 0.5*(1+sign*y);
}
function bsPrice(S,K,T,r,sig,type){
  if(T<=0)return type==="call"?Math.max(S-K,0):Math.max(K-S,0);
  if(sig<=0||S<=0||K<=0)return 0;
  const d1=(Math.log(S/K)+(r+sig*sig/2)*T)/(sig*Math.sqrt(T)),d2=d1-sig*Math.sqrt(T);
  return type==="call"?S*normalCDF(d1)-K*Math.exp(-r*T)*normalCDF(d2):K*Math.exp(-r*T)*normalCDF(-d2)-S*normalCDF(-d1);
}
function bsGreeks(S,K,T,r,sig,type){
  if(T<=0||sig<=0||S<=0)return{delta:0,gamma:0,theta:0,vega:0,rho:0};
  const sq=Math.sqrt(T),d1=(Math.log(S/K)+(r+sig*sig/2)*T)/(sig*sq),d2=d1-sig*sq;
  const nd1=Math.exp(-d1*d1/2)/Math.sqrt(2*Math.PI);
  return{
    delta:type==="call"?normalCDF(d1):normalCDF(d1)-1,
    gamma:nd1/(S*sig*sq),
    theta:(type==="call"?-(S*nd1*sig)/(2*sq)-r*K*Math.exp(-r*T)*normalCDF(d2):-(S*nd1*sig)/(2*sq)+r*K*Math.exp(-r*T)*normalCDF(-d2))/365,
    vega:S*nd1*sq/100,
    rho:(type==="call"?1:-1)*K*T*Math.exp(-r*T)*normalCDF(type==="call"?d2:-d2)/100,
  };
}

/* ─────────────────────────────────────────
   PNL
───────────────────────────────────────── */
function pnl(strat,p,S,days){
  const T=Math.max(days/365,0),n=p.contracts*100,sig=p.iv/100,r=p.rfr/100;
  if(strat==="long_call")       {const v=T<=0?Math.max(S-p.strike,0):bsPrice(S,p.strike,T,r,sig,"call");return(v-p.premium)*n;}
  if(strat==="long_put")        {const v=T<=0?Math.max(p.strike-S,0):bsPrice(S,p.strike,T,r,sig,"put"); return(v-p.premium)*n;}
  if(strat==="covered_call")    {const v=T<=0?Math.max(S-p.strike,0):bsPrice(S,p.strike,T,r,sig,"call");const costBasis=p.purchasePrice??p.stockPrice;const sN=p.sharesOwned??n;const oN=n;return(S-costBasis)*sN+(p.premium-v)*oN;}
  if(strat==="cash_secured_put"){const v=T<=0?Math.max(p.strike-S,0):bsPrice(S,p.strike,T,r,sig,"put"); return(p.premium-v)*n;}
  if(strat==="call_spread"){
    const v1=T<=0?Math.max(S-p.strike,0):bsPrice(S,p.strike,T,r,sig,"call");
    const v2=T<=0?Math.max(S-p.leg2Strike,0):bsPrice(S,p.leg2Strike,T,r,(p.leg2Iv?p.leg2Iv/100:sig),"call");
    return(v1-p.premium+p.leg2Premium-v2)*n;
  }
  if(strat==="put_spread"){
    const v1=T<=0?Math.max(p.strike-S,0):bsPrice(S,p.strike,T,r,sig,"put");
    const v2=T<=0?Math.max(p.leg2Strike-S,0):bsPrice(S,p.leg2Strike,T,r,(p.leg2Iv?p.leg2Iv/100:sig),"put");
    return(v1-p.premium+p.leg2Premium-v2)*n;
  }
  if(strat==="pmcc"){
    const dteDiff=Math.max(0,(p.dte||30)-(p.leg2Dte||30));
    const backT=Math.max((days+dteDiff)/365,0);
    const frontT=Math.max(days/365,0);
    const v1=backT<=0?Math.max(S-p.strike,0):bsPrice(S,p.strike,backT,r,sig,"call");
    const v2=frontT<=0?Math.max(S-p.leg2Strike,0):bsPrice(S,p.leg2Strike,frontT,r,(p.leg2Iv?p.leg2Iv/100:sig),"call");
    return(v1-p.premium+p.leg2Premium-v2)*n;
  }
  if(strat==="calendar_spread"){
    const dteDiff=Math.max(0,(p.dte||30)-(p.leg2Dte||30));
    const backT=Math.max((days+dteDiff)/365,0);
    const frontT=Math.max(days/365,0);
    const v1=backT<=0?Math.max(S-p.strike,0):bsPrice(S,p.strike,backT,r,sig,"call");
    const v2=frontT<=0?Math.max(S-p.strike,0):bsPrice(S,p.strike,frontT,r,(p.leg2Iv?p.leg2Iv/100:sig),"call");
    return(v1-p.premium+p.leg2Premium-v2)*n;
  }
  return 0;
}

/* ─────────────────────────────────────────
   API CALL TRACKER
───────────────────────────────────────── */
const DAILY_LIMIT = 100; // update this when you switch providers

function useCallTracker() {
  const key = 'optionslab_api_tracker';

  const load = () => {
    try {
      const s = JSON.parse(localStorage.getItem(key) || '{}');
      const today = new Date().toDateString();
      if (s.date !== today) return { date: today, count: 0, history: [] };
      return s;
    } catch { return { date: new Date().toDateString(), count: 0, history: [] }; }
  };

  const [state, setState] = useState(load);

  const increment = useCallback((endpoint) => {
    setState(prev => {
      const today = new Date().toDateString();
      const base = prev.date !== today ? { date: today, count: 0, history: [] } : prev;
      const next = {
        ...base,
        count: base.count + 1,
        history: [...(base.history || []).slice(-49), { time: Date.now(), endpoint }],
      };
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  const reset = useCallback(() => {
    const fresh = { date: new Date().toDateString(), count: 0, history: [] };
    try { localStorage.setItem(key, JSON.stringify(fresh)); } catch {}
    setState(fresh);
  }, []);

  const pct = Math.min((state.count / DAILY_LIMIT) * 100, 100);
  const status = state.count >= DAILY_LIMIT ? 'over' : state.count >= DAILY_LIMIT * 0.8 ? 'warn' : 'ok';

  return { count: state.count, limit: DAILY_LIMIT, pct, status, increment, reset, history: state.history || [] };
}

function ToastStack({ toasts, onDismiss }) {
  return (
    <div className="toast-stack">
      {toasts.map(t => (
        <div key={t.id} className={`toast${t.out ? ' out' : ''}`}>
          <div className="toast-icon">{t.icon}</div>
          <div style={{ flex: 1 }}>
            <div className="toast-title">{t.title}</div>
            <div className="toast-msg">{t.msg}</div>
          </div>
          <button className="toast-close" onClick={() => onDismiss(t.id)}>×</button>
        </div>
      ))}
    </div>
  );
}

/* ─────────────────────────────────────────
   FINNHUB
───────────────────────────────────────── */
function useFinnhub({ onCall } = {}){
  const [sr,setSR]=useState([]);
  const [sl,setSL]=useState(false);
  const [ql,setQL]=useState(false);
  const [qe,setQE]=useState("");
  const timer=useRef(null),cache=useRef({});
  const search=useCallback((q)=>{
    if(timer.current)clearTimeout(timer.current);
    if(!q){setSR([]);return;}
    setSL(true);
    timer.current=setTimeout(async()=>{
      try{
        onCall?.('search');
        const r=await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const d=await r.json();
        setSR(d.results||[]);
      }catch{setSR([]);}
      setSL(false);
    },300);
  },[onCall]);
  const quote=useCallback(async(sym)=>{
    if(cache.current[sym]&&Date.now()-cache.current[sym].ts<30000)return cache.current[sym].data;
    setQL(true);setQE("");
    try{
      onCall?.('quote');
      const r=await fetch(`/api/quote?symbol=${encodeURIComponent(sym)}`);
      if(!r.ok){const e=await r.json();setQE(e.error||`Could not load ${sym}.`);setQL(false);return null;}
      const data=await r.json();
      cache.current[sym]={data,ts:Date.now()};
      setQL(false);return data;
    }catch{setQE(`Could not load ${sym}.`);setQL(false);return null;}
  },[onCall]);
  return{sr,sl,search,quote,ql,qe};
}

  padding:13px 20px;border:none;border-bottom:2.5px solid transparent;
  background:transparent;cursor:pointer;text-align:left;
  transition:all var(--tr);flex:1 1 25%;min-width:140px;justify-content:center;
  border-radius:0;
}
.sbtn:nth-child(n+5){border-top:1px solid var(--brd);}
.sbtn:hover{background:var(--bg)}
.sbtn.active{border-bottom-color:currentColor;background:var(--bg)}
.stag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.strat-desc{
  padding:8px 40px;font-size:12px;color:var(--t2);line-height:1.6;
  border-bottom:1px solid var(--brd);background:var(--bg);
  transition:all var(--tr);
}

/* ── Dropdown ── */
.dd{
  position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:200;
  background:var(--white);border:1.5px solid var(--brd);border-radius:12px;
  max-height:275px;overflow-y:auto;animation:dropIn .18s ease-out;
  box-shadow:var(--shadow-md);
}
.ddi{padding:10px 13px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd-lt);transition:background .12s}
.ddi:last-child{border-bottom:none}
.ddi:hover{background:var(--bg)}
.dd-tick{font-family:var(--mono);font-weight:700;font-size:11px;padding:3px 8px;border-radius:5px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-brd);min-width:50px;text-align:center;flex-shrink:0}

/* ── Stock chip ── */
.stock-chip{margin-top:13px;padding:13px 15px;border-radius:11px;background:var(--blue-bg);border:1px solid var(--blue-brd);animation:fadeUp .25s ease-out}

/* ── Spinner ── */
.spin{width:15px;height:15px;border-radius:50%;border:2px solid var(--brd);border-top-color:var(--blue);animation:spin .7s linear infinite}

/* ── Metric cards ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.mc{
  background:var(--white);border:1px solid var(--brd);border-radius:14px;
  padding:18px 20px;box-shadow:var(--shadow-sm);
  transition:box-shadow var(--tr),transform var(--tr);position:relative;overflow:hidden;
}
.mc:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.mc-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.mc-label{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;padding-left:12px}
.mc-val{font-size:clamp(13px,1.58vw,19px);font-weight:700;font-family:var(--mono);letter-spacing:-.03em;font-feature-settings:"tnum" 1;padding:0 10px 0 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-sub{font-size:11px;color:var(--t3);margin-top:4px;padding-left:12px}

/* ── Greeks ── */
.greeks{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.gc{background:var(--white);border:1px solid var(--brd);border-radius:11px;padding:14px 15px;box-shadow:var(--shadow-xs);transition:box-shadow var(--tr)}
.gc:hover{box-shadow:var(--shadow-sm)}
.gc-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.gc-val{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--t1);font-feature-settings:"tnum" 1}
.gc-hint{font-size:10px;color:var(--t4);margin-top:3px}

/* ── Chart ── */
.chart-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:32px;padding:20px 22px 15px;border-bottom:1px solid var(--brd)}
.chart-title{font-size:15px;font-weight:700;color:var(--t1)}
.chart-sub{font-size:11.5px;color:var(--t3);margin-top:3px}
.chart-badge{font-family:var(--mono);font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:8px;background:var(--blue-bg);color:var(--t1);border:1px solid var(--blue-brd);display:flex;align-items:center;white-space:nowrap}
.chart-legend{display:flex;gap:16px;font-size:10.5px;font-family:var(--mono);flex-wrap:wrap;margin-top:6px}
.cl-item{display:flex;align-items:center;gap:5px}
.cl-line{width:16px;height:2.5px;border-radius:2px}

/* ── Table ── */
.etbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:13px}
.etbl thead th{
  padding:11px 18px;text-align:right;font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--t3);
  background:var(--bg);border-bottom:1.5px solid var(--brd);
}
.etbl thead th:first-child{text-align:left}
.etbl td{padding:10px 18px;text-align:right;border-bottom:1px solid var(--brd-lt)}
.etbl td:first-child{text-align:left;color:var(--t2);font-weight:500}
.etbl tr:last-child td{border-bottom:none}
.etbl tbody tr:hover td{background:var(--bg)}
.etbl tr.cur td{background:var(--blue-bg)}
.etbl tr.cur td:first-child{color:var(--blue);font-weight:700}
.pos{color:var(--green);font-weight:600}
.neg{color:var(--red);font-weight:600}

/* ── Empty ── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--white);border:1.5px dashed var(--brd);border-radius:20px;
  padding:80px 40px;text-align:center;min-height:400px;
  animation:fadeUp .3s ease-out;box-shadow:var(--shadow-sm);
}
.empty-icon{font-size:52px;margin-bottom:20px;line-height:1}
.empty-h{font-size:22px;font-weight:700;color:var(--t1);margin-bottom:10px;letter-spacing:-.02em}
.empty-p{font-size:14px;color:var(--t2);max-width:360px;line-height:1.7;margin-bottom:28px}
.step-list{display:flex;flex-direction:column;gap:10px;text-align:left}
.step-row{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--t2)}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--blue-bg);border:1.5px solid var(--blue-brd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--blue);flex-shrink:0}

/* ── API key ── */
.api-intro{font-size:12px;color:var(--t3);line-height:1.65;margin-bottom:11px}
.api-intro a{color:var(--blue);font-weight:600;text-decoration:none}
.api-saved{display:flex;align-items:center;justify-content:space-between}
.api-key-val{font-size:12px;font-family:var(--mono);color:var(--t2)}
.status-row{display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all .3s}
.connected-badge{font-size:10px;font-weight:700;color:var(--green);background:var(--green-bg);border:1px solid var(--green-brd);padding:2px 8px;border-radius:5px}

/* ── Divider ── */
.divor{display:flex;align-items:center;gap:12px;margin:12px 0}
.divor::before,.divor::after{content:'';flex:1;height:1px;background:var(--brd)}
.divor span{font-size:10.5px;color:var(--t4);font-weight:600;text-transform:uppercase;letter-spacing:.1em}

/* ── Fade in ── */
.fu {animation:fadeUp .35s ease-out}
.fu1{animation:fadeUp .42s ease-out}
.fu2{animation:fadeUp .49s ease-out}
.fu3{animation:fadeUp .56s ease-out}
.fu4{animation:fadeUp .63s ease-out}

/* ── Error ── */
.err{font-size:12px;color:var(--red);margin-top:8px;line-height:1.5}

/* ── IV Adjuster ── */
.iv-control{
  display:flex;flex-direction:row;align-items:center;gap:10px;
  padding:6px 14px;background:var(--bg);border:1.5px solid var(--brd);
  border-radius:9px;
}
.iv-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);white-space:nowrap}
.iv-row{display:flex;align-items:center;gap:8px}
.iv-divider{width:1px;align-self:stretch;background:var(--brd);margin:0 2px}
.iv-reset-btn{
  display:inline-flex;align-items:center;
  background:none;border:1.5px solid var(--brd);border-radius:6px;
  font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t3);
  cursor:pointer;padding:3px 6px;transition:all var(--tr);line-height:1;
}
.iv-reset-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.iv-reset-btn:disabled{opacity:.35;cursor:default}
.iv-reset-btn:disabled:hover{border-color:var(--brd);color:var(--t3);background:none}
.iv-slider{
  -webkit-appearance:none;appearance:none;width:82px;height:4px;border-radius:2px;
  outline:none;cursor:pointer;flex-shrink:0;
}
.iv-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--blue);border:2.5px solid #fff;
  box-shadow:0 1px 4px rgba(37,99,235,.35);cursor:pointer;
  transition:transform .1s;
}
.iv-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
.iv-slider::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;background:var(--blue);
  border:2.5px solid #fff;box-shadow:0 1px 4px rgba(37,99,235,.35);cursor:pointer;
}
.iv-inp-wrap{position:relative;display:flex;align-items:center}
.iv-inp{
  width:54px;background:var(--white);border:1.5px solid var(--brd);border-radius:7px;
  color:var(--t1);font-family:var(--mono);font-size:12.5px;font-weight:600;
  padding:4px 20px 4px 8px;outline:none;transition:border-color var(--tr);
  -moz-appearance:textfield;
}
.iv-inp::-webkit-inner-spin-button,.iv-inp::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.iv-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.iv-sfx{position:absolute;right:7px;font-size:11px;font-weight:600;color:var(--t3);pointer-events:none;font-family:var(--mono)}

/* ── View toggle ── */
.view-toggle{display:flex;gap:4px;background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:3px;align-items:center}
.vt-btn{
  display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:none;
  cursor:pointer;font-family:var(--font);font-size:11.5px;font-weight:600;color:var(--t3);
  background:transparent;transition:all var(--tr);
}
.vt-btn.active{background:var(--white);color:var(--blue);box-shadow:var(--shadow-xs);border:1px solid var(--brd)}
.vt-btn:not(.active):hover{color:var(--t1)}

/* ── Heat map table ── */
.hmap-wrap{overflow:auto;max-height:780px}
.hmap{border-collapse:collapse;font-family:var(--mono);font-size:11.5px;white-space:nowrap}
.hmap th{
  position:sticky;top:0;z-index:2;
  padding:7px 10px;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--t3);background:var(--bg);border-bottom:1.5px solid var(--brd);text-align:center;
}
.hmap th:first-child{text-align:left;position:sticky;left:0;z-index:3;min-width:72px}
.hmap th:last-child{position:sticky;right:0;z-index:3;background:var(--bg)}
.hmap td{padding:4px 8px;text-align:right;border:1px solid rgba(0,0,0,.04);font-size:11px;font-weight:600;font-feature-settings:"tnum" 1}
.hmap td:first-child{
  position:sticky;left:0;z-index:1;text-align:left;
  font-size:11.5px;font-weight:700;color:var(--t2);
  background:var(--bg);border-right:1.5px solid var(--brd);padding:4px 10px;
}
.hmap td:last-child{position:sticky;right:0;z-index:1;background:var(--bg);border-left:1.5px solid var(--brd);padding:4px 10px}
.hmap tr.cur-price td:first-child{color:var(--blue);background:var(--blue-bg)}
.hmap tr.cur-price td:last-child{background:var(--blue-bg)}

/* ── Price range row ── */
.price-range-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── Options chain modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(15,23,42,.45);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeUp .2s ease-out;
}
.modal{
  background:var(--white);border-radius:18px;border:1px solid var(--brd);
  box-shadow:0 24px 64px rgba(0,0,0,.18),0 4px 16px rgba(0,0,0,.08);
  width:min(960px,100%);max-height:90vh;display:flex;flex-direction:column;
  overflow:hidden;animation:fadeUp .22s cubic-bezier(.4,0,.2,1);
}
.modal-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 24px;border-bottom:1px solid var(--brd);flex-shrink:0;
}
.modal-title{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.modal-sub{font-size:11.5px;color:var(--t3);margin-top:2px}
.modal-close{
  width:32px;height:32px;border-radius:8px;border:1.5px solid var(--brd);
  background:transparent;cursor:pointer;font-size:17px;color:var(--t3);
  display:flex;align-items:center;justify-content:center;transition:all var(--tr);
}
.modal-close:hover{background:var(--bg);color:var(--t1)}

/* Expiration bar */
.exp-bar{padding:14px 24px;border-bottom:1px solid var(--brd);flex-shrink:0}
.exp-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.exp-nav{display:flex;align-items:center;gap:6px}
.exp-arrow{flex-shrink:0;width:28px;height:28px;border-radius:7px;border:1.5px solid var(--brd);background:var(--white);cursor:pointer;font-size:18px;line-height:1;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:all var(--tr);padding:0}
.exp-arrow:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.exp-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;flex:1}
.exp-scroll::-webkit-scrollbar{height:3px}
.exp-scroll::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.exp-btn{
  flex-shrink:0;padding:5px 11px;border-radius:7px;border:1.5px solid var(--brd);
  background:var(--white);cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:600;
  color:var(--t2);transition:all var(--tr);white-space:nowrap;
}
.exp-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.exp-btn.active{border-color:var(--blue);background:var(--blue);color:#fff}


/* Chain table */
.chain-wrap{overflow:auto;flex:1}
.chain-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
.chain-tbl thead{position:sticky;top:0;z-index:10}
.chain-tbl .th-group{background:var(--bg);padding:7px 0;text-align:center;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--brd)}
.chain-tbl .th-group.call-hd{color:var(--blue)}
.chain-tbl .th-group.put-hd{color:var(--red)}
.chain-tbl .th-group.mid-hd{color:var(--t2)}
.chain-tbl .th-sub{background:var(--bg);padding:5px 10px;text-align:center;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t4);border-bottom:1.5px solid var(--brd)}
.chain-tbl .th-strike{background:var(--bg);text-align:center;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3)}
.chain-tbl td{padding:5px 10px;text-align:center;border-bottom:1px solid var(--brd-lt)}
.chain-tbl .td-strike{font-weight:700;font-size:12.5px;color:var(--t1);background:var(--bg);position:relative;text-align:center;border-left:1px solid var(--brd);border-right:1px solid var(--brd)}
.chain-tbl .td-mid{font-weight:700;color:var(--t1)}
.chain-tbl .td-dim{color:var(--t3)}
.chain-tbl tbody tr:hover .td-call{background:#EFF6FF}
.chain-tbl tbody tr:hover .td-put{background:#FEF2F2}
.chain-tbl tbody tr:hover .td-strike{background:var(--bg)}
.chain-tbl .td-call{cursor:pointer}
.chain-tbl .td-put{cursor:pointer}
.chain-tbl .td-call:hover{background:#DBEAFE !important}
.chain-tbl .td-put:hover{background:#FEE2E2 !important}
.chain-tbl tr.atm .td-strike{background:var(--blue-bg);color:var(--blue)}
.chain-tbl tr.atm .td-strike::before{content:"▶";position:absolute;left:6px;font-size:8px;color:var(--blue);top:50%;transform:translateY(-50%)}
.chain-tbl .itm-call{background:rgba(37,99,235,.04)}
.chain-tbl .itm-put{background:rgba(220,38,38,.04)}
.chain-tbl .td-muted{color:var(--t4)!important;opacity:.45;pointer-events:none}
.chain-tbl .td-inactive{opacity:.18;pointer-events:none}
.chain-tbl .td-preferred-buy{font-weight:700;color:var(--blue)!important}
.chain-tbl .td-preferred-sell{font-weight:700;color:var(--red)!important}
.chain-tbl .th-preferred-buy{color:var(--blue)!important;font-weight:800}
.chain-tbl .th-preferred-sell{color:var(--red)!important;font-weight:800}
.chain-tbl .th-muted{opacity:.38}
.chain-tbl .th-group.side-inactive{opacity:.25}
.chain-info{font-size:10.5px;color:var(--t4);padding:8px 24px;text-align:center;border-top:1px solid var(--brd);flex-shrink:0;font-family:var(--mono)}

/* Select option button */
.opt-select-btn{
  display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;
  border:1.5px solid var(--blue-brd);background:var(--blue-bg);cursor:pointer;
  font-family:var(--font);font-size:12px;font-weight:600;color:var(--blue);
  transition:all var(--tr);margin-top:11px;width:100%;justify-content:center;
}
.opt-select-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.selected-contract{
  margin-top:10px;padding:10px 13px;border-radius:9px;
  background:var(--bg);border:1px solid var(--brd);font-family:var(--mono);font-size:11.5px;
}
.sc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sc-row:last-child{margin-bottom:0}

/* ── API Call Counter ── */
.call-counter{
  display:flex;align-items:center;gap:7px;padding:5px 11px;
  border-radius:20px;border:1.5px solid var(--brd);background:var(--white);
  font-size:11px;font-weight:600;font-family:var(--mono);color:var(--t2);
  cursor:default;transition:all var(--tr);
}
.call-counter.warn{border-color:var(--amber-brd);background:var(--amber-bg);color:var(--amber)}
.call-counter.over{border-color:var(--red-brd);background:var(--red-bg);color:var(--red)}
.call-bar-wrap{width:52px;height:5px;border-radius:3px;background:var(--brd);overflow:hidden}
.call-bar{height:100%;border-radius:3px;transition:width .4s ease,background .4s ease}

/* ── Toast notifications ── */
.toast-stack{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{
  display:flex;align-items:flex-start;gap:11px;
  padding:14px 16px;border-radius:13px;min-width:290px;max-width:360px;
  background:var(--white);border:1.5px solid var(--brd);
  box-shadow:var(--shadow-md);pointer-events:all;
  animation:slideIn .3s cubic-bezier(.4,0,.2,1) forwards;
}
.toast.out{animation:slideOut .3s cubic-bezier(.4,0,.2,1) forwards}
.toast-icon{font-size:18px;line-height:1;flex-shrink:0;margin-top:1px}
.toast-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:3px}
.toast-msg{font-size:11.5px;color:var(--t3);line-height:1.5}
.toast-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--t4);font-size:16px;line-height:1;padding:0 0 0 6px;flex-shrink:0}
.toast-close:hover{color:var(--t2)}

/* ── Mobile responsive ── */
@media (max-width:640px){
  /* Hard-constrain everything to viewport width */
  html{width:100%;overflow-x:hidden}
  body{width:100%;overflow-x:hidden;max-width:100vw}

  /* Grid blowout fix: grid children must be allowed to shrink below content size */
  .page{
    grid-template-columns:minmax(0,1fr);
    padding:14px 12px;gap:14px;
    width:100%;box-sizing:border-box;overflow:hidden;
  }
  .sidebar,.main-stack{min-width:0;width:100%;overflow:hidden}

  /* Header */
  .hdr{padding:0 14px;height:52px;width:100%;box-sizing:border-box}
  .logo-sub{display:none}
  .hdr-meta{display:none}
  .call-counter{display:none}
  .live-pill{padding:4px 9px;font-size:10px}

  /* Strategy bar */
  .strat-bar{padding:0 4px;overflow-x:auto;width:100%;box-sizing:border-box}
  .sbtn{padding:10px 10px;gap:5px;flex:0 0 auto}
  .sbtn .stag{display:none}
  .strat-desc{padding:8px 14px;font-size:11.5px}

  /* Card padding; force width within grid cell */
  .cp{padding:15px 14px}
  .card{width:100%;box-sizing:border-box;overflow:hidden;min-width:0}

  /* Prevent iOS Safari auto-zoom on input focus (triggered when font-size < 16px) */
  input,select,textarea{font-size:16px !important}

  /* Stock chip: prevent overflow */
  .stock-chip{overflow:hidden}

  /* Metrics: 2 columns */
  .metrics{grid-template-columns:repeat(2,1fr);gap:10px}
  .mc-val{font-size:clamp(12px,3.2vw,17px)}

  /* Greeks: 3 columns */
  .greeks{grid-template-columns:repeat(3,1fr)}

  /* IV adjuster: compact on mobile */
  .iv-control{gap:6px;padding:5px 8px}
  .iv-slider{width:70px}
  .iv-inp{width:46px;font-size:16px !important}

  /* P&L table: allow horizontal scroll */
  .hmap-wrap{max-height:360px}

  /* Expiration table */
  .etbl{font-size:12px}
  .etbl thead th,.etbl td{padding:8px 10px}

  /* Price range inputs stacked */
  .price-range-row{grid-template-columns:1fr}

  /* Modal: bottom sheet — height capped safely below iOS browser chrome */

  .modal{
    width:100%;
    max-height:72vh;
    border-radius:20px 20px 0 0;
  }
  /* Use small viewport height on browsers that support it (excludes Safari chrome) */
  @supports (height:1svh){
    .modal{max-height:calc(100svh - 10px);border-radius:20px 20px 0 0}
  }
  .modal-hd{padding:12px 14px}
  .modal-title{font-size:13px}
  .modal-sub{font-size:10px}
  .modal-close{width:28px;height:28px;font-size:14px}
  .exp-bar{padding:8px 10px}
  .exp-label{display:none}
  .exp-btn{padding:4px 8px;font-size:10px}
  .chain-wrap{overflow-x:hidden;-webkit-overflow-scrolling:touch}

  /* Chain table: compact to fit 7 cols in ~375px */

  .chain-tbl .th-sub{padding:3px 4px;font-size:8.5px}

  /* Increase opacity of dimmed columns so they're legible on small screens */
  .chain-tbl .td-muted{opacity:.7 !important}
  .chain-tbl .td-inactive{opacity:.5 !important}
  .chain-tbl .th-muted{opacity:.6 !important}
  .chain-tbl .th-group.side-inactive{opacity:.5 !important}

  /* Bottom close button shown only on mobile */

  .chain-info{padding:5px 12px;font-size:9.5px}

  /* Toast: full width */
  .toast-stack{left:10px;right:10px;bottom:10px}

  /* Empty state */
  .empty{padding:40px 18px;min-height:260px}
  .empty-h{font-size:18px}
  .empty-p{font-size:13px}
}

    script.src='https://s3.tradingview.com/tv.js';
    script.async=true;
    script.onload=()=>{
      if(window.TradingView){
        new window.TradingView.widget({
          container_id:'tv-chart-container',
          symbol:symbol,
          interval:'D',
          timezone:'America/New_York',
          theme:'light',
          style:'1',
          locale:'en',
          toolbar_bg:'#f1f3f6',

  },[symbol]);

  // Close on backdrop click
  function onBackdrop(e){if(e.target===e.currentTarget)onClose();}

  return(
    <div onClick={onBackdrop} style={{
      position:'fixed',inset:0,zIndex:600,background:'rgba(15,23,42,.55)',

/* ─────────────────────────────────────────
   PNL CHART
───────────────────────────────────────── */
function PnLChart({strategy,params,dte,minPrice,maxPrice}){
  const canvasRef=useRef(null);
  const[tip,setTip]=useState(null);
  const[dims,setDims]=useState({w:800,h:360});
  const{stockPrice}=params;
  const range=stockPrice*0.4;
  const minP=minPrice>0?minPrice:Math.max(stockPrice-range,.01);
  const maxP=maxPrice>minP?maxPrice:stockPrice+range;
  const N=280;
  const PAD={t:50,r:24,b:44,l:80};

  const slices=useMemo(()=>[
    {d:dte,                   label:`Today (${dte}d)`,              color:"#2563EB",w:1.5},
    {d:Math.round(dte*.5),    label:`${Math.round(dte*.5)}d left`,  color:"#D97706",w:1.5},
    {d:Math.round(dte*.2),    label:`${Math.round(dte*.2)}d left`,  color:"#EA580C",w:1.5},
    {d:0,                     label:"At Expiry",                    color:"#059669",w:2.5},
  ].map(c=>({
    ...c,
    pts:Array.from({length:N+1},(_,i)=>{
      const price=minP+(maxP-minP)*(i/N);
      return{price,pnl:pnl(strategy,params,price,c.d)};
    }),
  })),[strategy,params,dte,minP,maxP]);

  const allP=slices.flatMap(s=>s.pts.map(p=>p.pnl));
  const rMin=Math.min(...allP),rMax=Math.max(...allP);
  const pad=(rMax-rMin)*.15||100;
  const yLo=rMin-pad,yHi=rMax+pad;

  const draw=useCallback(()=>{
    const c=canvasRef.current;if(!c)return;
    const dpr=window.devicePixelRatio||1;
    const rect=c.getBoundingClientRect();
    c.width=rect.width*dpr;c.height=rect.height*dpr;
    const ctx=c.getContext("2d");ctx.scale(dpr,dpr);
    const W=rect.width,H=rect.height;
    setDims({w:W,h:H});
    const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
    const toX=p=>PAD.l+((p-minP)/(maxP-minP))*cw;
    const toY=v=>PAD.t+(1-(v-yLo)/(yHi-yLo))*ch;

    // White background
    ctx.fillStyle="#FFFFFF";
    ctx.fillRect(0,0,W,H);

    ctx.font="11px 'JetBrains Mono',monospace";

    // Y grid + labels
    for(let i=0;i<=5;i++){
      const val=yLo+(yHi-yLo)*i/5,y=toY(val);
      ctx.strokeStyle="rgba(15,23,42,.07)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
      ctx.fillStyle="#1E293B";ctx.textAlign="right";
      ctx.fillText(`${val>=0?"+":""}$${val.toFixed(0)}`,PAD.l-8,y+4);
    }
    // X labels
    for(let i=0;i<=6;i++){
      const val=minP+(maxP-minP)*i/6,x=toX(val);
      ctx.fillStyle="#1E293B";ctx.textAlign="center";
      ctx.fillText(`$${val.toFixed(0)}`,x,H-PAD.b+16);
    }
    // Zero line
    if(yLo<0&&yHi>0){
      const y0=toY(0);
      ctx.strokeStyle="#CBD5E1";ctx.lineWidth=1;
      ctx.setLineDash([7,5]);ctx.beginPath();ctx.moveTo(PAD.l,y0);ctx.lineTo(W-PAD.r,y0);ctx.stroke();ctx.setLineDash([]);
    }
    // Current price line
    const cpx=toX(stockPrice);
    ctx.strokeStyle="rgba(15,23,42,.35)";ctx.lineWidth=1;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(cpx,PAD.t);ctx.lineTo(cpx,H-PAD.b);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="#0F172A";ctx.font="10.5px 'JetBrains Mono',monospace";ctx.textAlign="center";
    ctx.fillText(`$${stockPrice.toFixed(2)}`,cpx,PAD.t-10);

    // Fill under expiry curve
    const exp=slices[slices.length-1],y0=toY(0);
    for(let i=0;i<exp.pts.length-1;i++){
      const a=exp.pts[i],b=exp.pts[i+1],profit=(a.pnl+b.pnl)/2>=0;
      ctx.fillStyle=profit?"rgba(5,150,105,.07)":"rgba(220,38,38,.06)";
      ctx.beginPath();ctx.moveTo(toX(a.price),toY(a.pnl));
      ctx.lineTo(toX(b.price),toY(b.pnl));ctx.lineTo(toX(b.price),y0);ctx.lineTo(toX(a.price),y0);ctx.closePath();ctx.fill();
    }
    // Curves
    for(const s of slices){
      ctx.strokeStyle=s.color;ctx.lineWidth=s.w;ctx.lineJoin="round";
      ctx.beginPath();
      s.pts.forEach((p,i)=>{const x=toX(p.price),y=toY(p.pnl);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke();
    }
  },[slices,stockPrice,minP,maxP,yLo,yHi]);

  useEffect(()=>{draw();},[draw]);
  useEffect(()=>{const h=()=>draw();window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[draw]);

  const onMouse=e=>{
    const r=canvasRef.current?.getBoundingClientRect();if(!r)return;
    const mx=e.clientX-r.left,rel=(mx-PAD.l)/(r.width-PAD.l-PAD.r);
    if(rel<0||rel>1){setTip(null);return;}
    const price=minP+rel*(maxP-minP),idx=Math.round(rel*N);
    setTip({x:mx,y:e.clientY-r.top,price,lines:slices.map(s=>({label:s.label,pnl:s.pts[Math.min(idx,s.pts.length-1)].pnl,color:s.color}))});
  };

  return(
    <div style={{position:"relative",width:"100%",height:360}}>
      <canvas ref={canvasRef} style={{width:"100%",height:"100%",cursor:"crosshair",borderRadius:"0 0 13px 13px"}}
        onMouseMove={onMouse} onMouseLeave={()=>setTip(null)}/>
      <div style={{position:"absolute",top:6,right:12}} className="chart-legend">
        {slices.map((s,i)=>(
          <div key={i} className="cl-item" style={{color:s.color}}>
            <div className="cl-line" style={{background:s.color}}/>
            <span style={{fontWeight:600}}>{s.label}</span>
          </div>
        ))}
      </div>
      {tip&&(
        <div style={{
          position:"absolute",left:Math.min(tip.x+14,dims.w-195),top:Math.max(tip.y-16,0),
          background:"#FFFFFF",border:"1.5px solid var(--brd)",borderRadius:11,
          padding:"11px 14px",fontSize:11.5,fontFamily:"var(--mono)",color:"var(--t1)",
          pointerEvents:"none",zIndex:20,minWidth:190,boxShadow:"var(--shadow-md)",
        }}>
          <div style={{fontWeight:600,marginBottom:8,color:"var(--t3)",fontSize:9.5,textTransform:"uppercase",letterSpacing:".08em"}}>
            Stock Price: <span style={{color:"var(--t1)",fontSize:13}}>${tip.price.toFixed(2)}</span>
          </div>
          {tip.lines.map((l,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",gap:18,marginBottom:3}}>
              <span style={{color:l.color,fontWeight:500}}>{l.label}</span>
              <span style={{color:l.pnl>=0?"var(--green)":"var(--red)",fontWeight:700}}>
                {l.pnl>=0?"+":""}${l.pnl.toFixed(0)}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────
   HEAT MAP TABLE
───────────────────────────────────────── */
function HeatMapTable({strategy,params,dte,minPrice,maxPrice}){
  const{stockPrice,contracts,premium}=params;
  const n=contracts*100;

  // Step size: target ~18 rows, rounded to a clean number
  const range=maxPrice-minPrice;
  const TARGET_ROWS=28;
  const rawStep=range/TARGET_ROWS;
  // Round to nearest clean increment
  const STEPS=[0.5,1,2,2.5,5,10,15,20,25,50,100,150,200,250,500];
  const step=STEPS.find(s=>s>=rawStep)||STEPS[STEPS.length-1];

  // Price rows: high → low
  const prices=[];
  for(let p=maxPrice;p>=minPrice-0.001;p-=step){
    prices.push(Math.round(p*100)/100);
  }
  // Replace the closest stepped price with the exact current stock price
  // so the NOW row always shows the true price, not a rounded approximation
  if(stockPrice>=minPrice&&stockPrice<=maxPrice){
    let closestIdx=0,closestDist=Infinity;
    prices.forEach((p,i)=>{const d=Math.abs(p-stockPrice);if(d<closestDist){closestDist=d;closestIdx=i;}});
    prices[closestIdx]=stockPrice;
  }

  // DTE columns: current DTE → 0 (expiry), max ~12 cols
  const numCols=Math.min(12,dte+1);
  const dteCols=Array.from({length:numCols},(_,i)=>
    Math.round(dte*(numCols-1-i)/(numCols-1))
  );
  if(dteCols[dteCols.length-1]!==0)dteCols[dteCols.length-1]=0;

  // Compute all P&L values
  const rows=prices.map(price=>({
    price,
    cells:dteCols.map(d=>pnl(strategy,params,price,d)),
    expiryPnl:pnl(strategy,params,price,0),
  }));

  // Color scale
  const allVals=rows.flatMap(r=>r.cells);
  const maxAbs=Math.max(Math.abs(Math.min(...allVals)),Math.abs(Math.max(...allVals)),1);

  const cellStyle=(val)=>{
    const t=Math.min(Math.abs(val)/maxAbs,1);
    const alpha=0.08+t*0.72;
    return val>=0
      ?{background:`rgba(5,150,105,${alpha})`,color:t>0.55?"#ECFDF5":"#065F46"}
      :{background:`rgba(220,38,38,${alpha})`,color:t>0.55?"#FEF2F2":"#7F1D1D"};
  };

  const basis=premium*n;

  return(
    <div className="hmap-wrap">
      <table className="hmap">
        <thead>
          <tr>
            <th>Price</th>
            {dteCols.map(d=>(
              <th key={d}>{d===0?"Exp":`${d}d`}</th>
            ))}
            <th>+/-%</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(row=>{
            const isCur=Math.abs(row.price-stockPrice)<0.005;
            const pct=basis>0?(row.expiryPnl/basis)*100:0;
            return(
              <tr key={row.price} className={isCur?"cur-price":""}>
                <td>
                  ${row.price.toFixed(step<1?2:step===1?2:2)}
                  {isCur&&<span style={{marginLeft:5,fontSize:8.5,fontWeight:700,color:"var(--blue)",background:"var(--blue-bg)",border:"1px solid var(--blue-brd)",padding:"1px 4px",borderRadius:3}}>NOW</span>}
                </td>
                {row.cells.map((val,i)=>(
                  <td key={i} style={cellStyle(val)}>
                    {val>=0?"+":""}{val.toFixed(0)}
                  </td>
                ))}
                <td style={{fontWeight:700,color:pct>=0?"var(--green)":"var(--red)"}}>
                  {pct>=0?"+":""}{pct.toFixed(1)}%
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

  long_put:         {label:'Long Put',         side:'put', buying:true },
  covered_call:     {label:'Covered Call',     side:'call',buying:false},
  cash_secured_put: {label:'Cash-Secured Put', side:'put', buying:false},
  call_spread:      {label:'Call Spread',      side:'call',buying:true },
  put_spread:       {label:'Put Spread',       side:'put', buying:true },
  pmcc:             {label:"Poor Man's CC",    side:'call',buying:true },
  calendar_spread:  {label:'Calendar Spread',  side:'call',buying:true },
};

  const meta=STRATEGY_META[strategy]||{label:'',side:'call',buying:true};
  const buying=legBuying!==undefined?legBuying:meta.buying;
  const{label:strategyLabel,side:relevantSide}=meta;

  // Per-column class helpers
  const subHdr=(side,col)=>{
    if(side!==relevantSide) return 'th-sub th-muted';
    if(buying  && col==='ask') return 'th-sub th-preferred-buy';
    if(!buying && col==='bid') return 'th-sub th-preferred-sell';
    if(col==='mid') return 'th-sub';
    return 'th-sub th-muted';
  };
  const cellCls=(side,col,itmCls)=>{
    const base=side==='call'?'td-call':'td-put';
    const itm=itmCls?` ${itmCls}`:'';
    if(side!==relevantSide) return `${base} td-inactive${itm}`;
    if(buying){
      if(col==='bid') return `${base} td-muted${itm}`;
      if(col==='mid') return `${base} td-mid${itm}`;
      if(col==='ask') return `${base} td-preferred-buy${itm}`;
    } else {
      if(col==='bid') return `${base} td-preferred-sell${itm}`;
      if(col==='mid') return `${base} td-mid${itm}`;
      if(col==='ask') return `${base} td-muted${itm}`;
    }
    return `${base}${itm}`;
  };

  const[expirations,setExpirations]=useState([]);
  const[selExp,setSelExp]=useState(null);
  const[rows,setRows]=useState([]);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const expCache=useRef({});

  // Load expirations on mount
  useEffect(()=>{
    setLoading(true);setError("");
    onCall?.('options');
    fetch(`/api/options?symbol=${encodeURIComponent(symbol)}&mode=expirations`)
      .then(r=>r.json())
      .then(d=>{
        if(d.error)throw new Error(d.error);
        setExpirations(d.expirations||[]);
        if(d.expirations?.length) setSelExp(d.expirations[0]);
      })
      .catch(e=>setError(e.message))
      .finally(()=>setLoading(false));
  },[symbol]);

  // Load chain when expiration changes
  useEffect(()=>{
    if(!selExp)return;
    if(expCache.current[selExp]){setRows(expCache.current[selExp]);return;}
    setLoading(true);setError("");
    onCall?.('options');
    fetch(`/api/options?symbol=${encodeURIComponent(symbol)}&mode=chain&expiration=${selExp}`)
      .then(r=>r.json())
      .then(d=>{
        if(d.error)throw new Error(d.error);
        expCache.current[selExp]=d.rows||[];
        setRows(d.rows||[]);
      })
      .catch(e=>setError(e.message))
      .finally(()=>setLoading(false));
  },[selExp,symbol]);

  // Format expiration label: "2026-04-17" → "Apr 17/26"
  const fmtExp=s=>{
    const[y,m,d]=s.split('-');
    const months=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return`${months[+m]} ${+d}/${y.slice(2)}`;
  };

  // Days to expiry from YYYY-MM-DD string
  const dteFromExp=s=>{
    const exp=new Date(s+'T16:00:00');
    return Math.max(0,Math.round((exp-Date.now())/(1000*60*60*24)));
  };

  const dte=selExp?dteFromExp(selExp):0;
  const expScrollRef=useRef(null);
  const scrollExp=dir=>expScrollRef.current?.scrollBy({left:dir*240,behavior:'smooth'});

  // Close on overlay click
  const overlayClick=e=>{if(e.target===e.currentTarget)onClose();};

  // Keyboard close
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[onClose]);

  // ATM row = closest strike to current price
  const atmStrike=rows.length?rows.reduce((best,r)=>
    Math.abs(r.strike-stockPrice)<Math.abs(best.strike-stockPrice)?r:best
  ,rows[0])?.strike:null;

  // Auto-scroll to ATM
  const atmRef=useRef(null);
  useEffect(()=>{
    if(atmRef.current)atmRef.current.scrollIntoView({block:'center',behavior:'smooth'});
  },[rows,atmStrike]);

  const pick=(row,side)=>{
    const c=row[side];
    if(!c)return;
    onSelect({
      side,
      strike:    row.strike,
      mid:       c.mid,
      bid:       c.bid,
      ask:       c.ask,
      iv:        c.iv,
      delta:     c.delta,
      theta:     c.theta,
      dte,
      expiration:selExp,
      symbol:    c.symbol,
    });
    onClose();
  };

  return(
    <div className="modal-overlay" onClick={overlayClick}>
      <div className="modal">

        {/* Header */}
        <div className="modal-hd">
          <div>
            <div className="modal-title">{strategyLabel} — {symbol}</div>
            <div className="modal-sub">
              {symbol} @ ${stockPrice.toFixed(2)} · {buying
                ? 'Buying — click the Ask or Mid column to select'
                : 'Selling — click the Bid or Mid column to select'}
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {/* Expiration selector */}
        <div className="exp-bar">
          <div className="exp-label">Expiration date</div>
          <div className="exp-nav">
            <button className="exp-arrow" onClick={()=>scrollExp(-1)}>‹</button>
            <div className="exp-scroll" ref={expScrollRef}>
              {expirations.map(e=>(
                <button key={e} className={`exp-btn${selExp===e?' active':''}`}
                  onClick={()=>setSelExp(e)}>
                  {fmtExp(e)}
                  <span style={{fontSize:9,marginLeft:4,color:selExp===e?'#fff':'var(--red)',opacity:selExp===e?1:.8}}>
                    {dteFromExp(e)}d
                  </span>
                </button>
              ))}
            </div>
            <button className="exp-arrow" onClick={()=>scrollExp(1)}>›</button>
          </div>
        </div>

        {/* Chain table */}
        <div className="chain-wrap">
          {loading&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:60,color:'var(--t3)',fontSize:13}}>
              <div className="spin"/><span>Loading options chain…</span>
            </div>
          )}
          {error&&!loading&&(
            <div style={{padding:40,textAlign:'center',color:'var(--red)',fontSize:13}}>{error}</div>
          )}
          {!loading&&!error&&rows.length>0&&(
            <table className="chain-tbl">
              <thead>
                <tr>
                  <th colSpan={3} className={`th-group call-hd${relevantSide!=='call'?' side-inactive':''}`}>Calls</th>
                  <th className="th-group mid-hd th-strike">Strike</th>
                  <th colSpan={3} className={`th-group put-hd${relevantSide!=='put'?' side-inactive':''}`}>Puts</th>
                </tr>
                <tr>
                  {['Bid','Mid','Ask'].map(h=>(
                    <th key={'c'+h} className={subHdr('call',h.toLowerCase())}>{h}</th>
                  ))}
                  <th className="th-sub th-strike">$</th>
                  {['Bid','Mid','Ask'].map(h=>(
                    <th key={'p'+h} className={subHdr('put',h.toLowerCase())}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map(row=>{
                  const c=row.call,p=row.put;
                  const isAtm=row.strike===atmStrike;
                  const itmCall=stockPrice>row.strike;
                  const itmPut=stockPrice<row.strike;
                  return(
                    <tr key={row.strike} className={isAtm?'atm':''} ref={isAtm?atmRef:null}>
                      {/* Call side */}
                      <td className={cellCls('call','bid',itmCall?'itm-call':'')} onClick={()=>pick(row,'call')}>{fmt(c?.bid)}</td>
                      <td className={cellCls('call','mid',itmCall?'itm-call':'')} onClick={()=>pick(row,'call')}>{fmt(c?.mid)}</td>
                      <td className={cellCls('call','ask',itmCall?'itm-call':'')} onClick={()=>pick(row,'call')}>{fmt(c?.ask)}</td>
                      {/* Strike */}
                      <td className="td-strike">${row.strike.toFixed(2)}</td>
                      {/* Put side */}
                      <td className={cellCls('put','bid',itmPut?'itm-put':'')} onClick={()=>pick(row,'put')}>{fmt(p?.bid)}</td>
                      <td className={cellCls('put','mid',itmPut?'itm-put':'')} onClick={()=>pick(row,'put')}>{fmt(p?.mid)}</td>
                      <td className={cellCls('put','ask',itmPut?'itm-put':'')} onClick={()=>pick(row,'put')}>{fmt(p?.ask)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>

        {/* Footer */}
        <div className="chain-info">
          Options prices are delayed 15 min · {buying?'Buying — click Ask or Mid':'Selling — click Bid or Mid'} · {dte}d to expiry
        </div>

        {/* Mobile-only close button always visible at bottom */}
        <button className="modal-close-mobile" onClick={onClose}
          style={{margin:'0 16px 16px',padding:'11px',borderRadius:10,border:'1.5px solid var(--brd)',
            background:'var(--bg)',cursor:'pointer',fontFamily:'var(--font)',fontSize:14,
            fontWeight:600,color:'var(--t2)',alignItems:'center',justifyContent:'center',gap:6}}>
          ✕ Close
        </button>

      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   IMPLIED VOLATILITY — bisection solver
   Finds the IV that makes BS price = market price
───────────────────────────────────────── */
function impliedVol(marketPrice, S, K, T, r, type){
  if(T<=0||marketPrice<=0||S<=0||K<=0) return 0.30;
  // Can't solve if price is at/below intrinsic
  const intrinsic=type==='call'?Math.max(S-K,0):Math.max(K-S,0);
  if(marketPrice<=intrinsic+0.001) return 0.001;
  let lo=0.001, hi=5.0;
  for(let i=0;i<300;i++){
    const mid=(lo+hi)/2;
    const price=bsPrice(S,K,T,r,mid,type);
    if(price<marketPrice) lo=mid; else hi=mid;
    if(hi-lo<0.00005) break;
  }
  return(lo+hi)/2;
}

/* ─────────────────────────────────────────
   HELPERS
───────────────────────────────────────── */
// Smart price range based on directional bias
function autoRange(sp, strat, strike=0){
  const bullish = strat==='long_call' || strat==='cash_secured_put';
  // Base range from stock price
  let low  = bullish ? sp*0.93 : sp*0.77;
  let high = bullish ? sp*1.22 : sp*1.07;
  // Ensure the strike is always visible with a 10% buffer beyond it
  if(strike>0){
    if(strike>high) high = strike*1.10;
    if(strike<low)  low  = strike*0.90;
  }
  // Round to nearest $0.50
  return { low: Math.round(low*2)/2, high: Math.round(high*2)/2 };
}

// Derive strategy from action (buy/write) + side (call/put)
function deriveStrategy(action, side){
  if(action==='buy')   return side==='call' ? 'long_call'    : 'long_put';
  if(action==='write') return side==='call' ? 'covered_call' : 'cash_secured_put';
  return 'long_call';
}
