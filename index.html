/* ─────────────────────────────────────────
   BLACK-SCHOLES
───────────────────────────────────────── */
function normalCDF(x) {
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign=x<0?-1:1,ax=Math.abs(x)/Math.sqrt(2);
  const t=1/(1+p*ax),y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-ax*ax);
  return 0.5*(1+sign*y);
}
function bsPrice(S,K,T,r,sig,type){
  if(T<=0)return type==="call"?Math.max(S-K,0):Math.max(K-S,0);
  if(sig<=0||S<=0||K<=0)return 0;
  const d1=(Math.log(S/K)+(r+sig*sig/2)*T)/(sig*Math.sqrt(T)),d2=d1-sig*Math.sqrt(T);
  return type==="call"?S*normalCDF(d1)-K*Math.exp(-r*T)*normalCDF(d2):K*Math.exp(-r*T)*normalCDF(-d2)-S*normalCDF(-d1);
}
function bsGreeks(S,K,T,r,sig,type){
  if(T<=0||sig<=0||S<=0)return{delta:0,gamma:0,theta:0,vega:0,rho:0};
  const sq=Math.sqrt(T),d1=(Math.log(S/K)+(r+sig*sig/2)*T)/(sig*sq),d2=d1-sig*sq;
  const nd1=Math.exp(-d1*d1/2)/Math.sqrt(2*Math.PI);
  return{
    delta:type==="call"?normalCDF(d1):normalCDF(d1)-1,
    gamma:nd1/(S*sig*sq),
    theta:(type==="call"?-(S*nd1*sig)/(2*sq)-r*K*Math.exp(-r*T)*normalCDF(d2):-(S*nd1*sig)/(2*sq)+r*K*Math.exp(-r*T)*normalCDF(-d2))/365,
    vega:S*nd1*sq/100,
    rho:(type==="call"?1:-1)*K*T*Math.exp(-r*T)*normalCDF(type==="call"?d2:-d2)/100,
  };
}

/* ─────────────────────────────────────────
   STRATEGIES
───────────────────────────────────────── */
const STRATS = {
  long_call:        {name:"Long Call",       tag:"Bullish", desc:"Buy a call — unlimited upside, risk limited to premium paid.",       accent:"#2563EB", tagBg:"#EFF6FF", tagC:"#1D4ED8", icon:"↗"},
  long_put:         {name:"Long Put",        tag:"Bearish", desc:"Buy a put — profit as stock falls below the strike minus premium.",  accent:"#DC2626", tagBg:"#FEF2F2", tagC:"#B91C1C", icon:"↘"},
  covered_call:     {name:"Covered Call",    tag:"Income",  desc:"Own shares + sell a call. Collect premium and cap your upside.",    accent:"#D97706", tagBg:"#FFFBEB", tagC:"#B45309", icon:"⇄"},
  cash_secured_put: {name:"Cash-Secured Put",tag:"Income",  desc:"Sell a put backed by cash. Collect premium, risk is assignment.",   accent:"#7C3AED", tagBg:"#F5F3FF", tagC:"#6D28D9", icon:"⊝"},
};

/* ─────────────────────────────────────────
   PNL
───────────────────────────────────────── */
function pnl(strat,p,S,days){
  const T=Math.max(days/365,0),n=p.contracts*100,sig=p.iv/100,r=p.rfr/100;
  if(strat==="long_call")       {const v=T<=0?Math.max(S-p.strike,0):bsPrice(S,p.strike,T,r,sig,"call");return(v-p.premium)*n;}
  if(strat==="long_put")        {const v=T<=0?Math.max(p.strike-S,0):bsPrice(S,p.strike,T,r,sig,"put"); return(v-p.premium)*n;}
  if(strat==="covered_call")    {const v=T<=0?Math.max(S-p.strike,0):bsPrice(S,p.strike,T,r,sig,"call");return((S-p.stockPrice)+(p.premium-v))*n;}
  if(strat==="cash_secured_put"){const v=T<=0?Math.max(p.strike-S,0):bsPrice(S,p.strike,T,r,sig,"put"); return(p.premium-v)*n;}
  return 0;
}

/* ─────────────────────────────────────────
   API CALL TRACKER
───────────────────────────────────────── */
const DAILY_LIMIT = 100; // update this when you switch providers

function useCallTracker() {
  const key = 'optionslab_api_tracker';

  const load = () => {
    try {
      const s = JSON.parse(localStorage.getItem(key) || '{}');
      const today = new Date().toDateString();
      if (s.date !== today) return { date: today, count: 0, history: [] };
      return s;
    } catch { return { date: new Date().toDateString(), count: 0, history: [] }; }
  };

  const [state, setState] = useState(load);

  const increment = useCallback((endpoint) => {
    setState(prev => {
      const today = new Date().toDateString();
      const base = prev.date !== today ? { date: today, count: 0, history: [] } : prev;
      const next = {
        ...base,
        count: base.count + 1,
        history: [...(base.history || []).slice(-49), { time: Date.now(), endpoint }],
      };
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  const reset = useCallback(() => {
    const fresh = { date: new Date().toDateString(), count: 0, history: [] };
    try { localStorage.setItem(key, JSON.stringify(fresh)); } catch {}
    setState(fresh);
  }, []);

  const pct = Math.min((state.count / DAILY_LIMIT) * 100, 100);
  const status = state.count >= DAILY_LIMIT ? 'over' : state.count >= DAILY_LIMIT * 0.8 ? 'warn' : 'ok';

  return { count: state.count, limit: DAILY_LIMIT, pct, status, increment, reset, history: state.history || [] };
}

/* ─────────────────────────────────────────
   TOAST STACK
───────────────────────────────────────── */
function ToastStack({ toasts, onDismiss }) {
  return (
    <div className="toast-stack">
      {toasts.map(t => (
        <div key={t.id} className={`toast${t.out ? ' out' : ''}`}>
          <div className="toast-icon">{t.icon}</div>
          <div style={{ flex: 1 }}>
            <div className="toast-title">{t.title}</div>
            <div className="toast-msg">{t.msg}</div>
          </div>
          <button className="toast-close" onClick={() => onDismiss(t.id)}>×</button>
        </div>
      ))}
    </div>
  );
}

/* ─────────────────────────────────────────
   FINNHUB
───────────────────────────────────────── */
function useFinnhub({ onCall } = {}){
  const [sr,setSR]=useState([]);
  const [sl,setSL]=useState(false);
  const [ql,setQL]=useState(false);
  const [qe,setQE]=useState("");
  const timer=useRef(null),cache=useRef({});
  const search=useCallback((q)=>{
    if(timer.current)clearTimeout(timer.current);
    if(!q){setSR([]);return;}
    setSL(true);
    timer.current=setTimeout(async()=>{
      try{
        onCall?.('search');
        const r=await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const d=await r.json();
        setSR(d.results||[]);
      }catch{setSR([]);}
      setSL(false);
    },300);
  },[onCall]);
  const quote=useCallback(async(sym)=>{
    if(cache.current[sym]&&Date.now()-cache.current[sym].ts<30000)return cache.current[sym].data;
    setQL(true);setQE("");
    try{
      onCall?.('quote');
      const r=await fetch(`/api/quote?symbol=${encodeURIComponent(sym)}`);
      if(!r.ok){const e=await r.json();setQE(e.error||`Could not load ${sym}.`);setQL(false);return null;}
      const data=await r.json();
      cache.current[sym]={data,ts:Date.now()};
      setQL(false);return data;
    }catch{setQE(`Could not load ${sym}.`);setQL(false);return null;}
  },[onCall]);
  return{sr,sl,search,quote,ql,qe};
}

/* ── Divider ── */
.divor{display:flex;align-items:center;gap:12px;margin:12px 0}
.divor::before,.divor::after{content:'';flex:1;height:1px;background:var(--brd)}
.divor span{font-size:10.5px;color:var(--t4);font-weight:600;text-transform:uppercase;letter-spacing:.1em}

/* ── Fade in ── */
.fu {animation:fadeUp .35s ease-out}
.fu1{animation:fadeUp .42s ease-out}
.fu2{animation:fadeUp .49s ease-out}
.fu3{animation:fadeUp .56s ease-out}
.fu4{animation:fadeUp .63s ease-out}

/* ── Error ── */
.err{font-size:12px;color:var(--red);margin-top:8px;line-height:1.5}

/* ── View toggle ── */
.view-toggle{display:flex;gap:4px;background:var(--bg);border:1.5px solid var(--brd);border-radius:9px;padding:3px}
.vt-btn{
  display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:none;
  cursor:pointer;font-family:var(--font);font-size:11.5px;font-weight:600;color:var(--t3);
  background:transparent;transition:all var(--tr);
}
.vt-btn.active{background:var(--white);color:var(--blue);box-shadow:var(--shadow-xs);border:1px solid var(--brd)}
.vt-btn:not(.active):hover{color:var(--t1)}

/* ── Heat map table ── */
.hmap-wrap{overflow:auto;max-height:520px}
.hmap{border-collapse:collapse;font-family:var(--mono);font-size:11.5px;white-space:nowrap}
.hmap th{
  position:sticky;top:0;z-index:2;
  padding:7px 10px;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--t3);background:var(--bg);border-bottom:1.5px solid var(--brd);text-align:center;
}
.hmap th:first-child{text-align:left;position:sticky;left:0;z-index:3;min-width:72px}
.hmap th:last-child{position:sticky;right:0;z-index:3;background:var(--bg)}
.hmap td{padding:4px 8px;text-align:right;border:1px solid rgba(0,0,0,.04);font-size:11px;font-weight:600;font-feature-settings:"tnum" 1}
.hmap td:first-child{
  position:sticky;left:0;z-index:1;text-align:left;
  font-size:11.5px;font-weight:700;color:var(--t2);
  background:var(--bg);border-right:1.5px solid var(--brd);padding:4px 10px;
}
.hmap td:last-child{position:sticky;right:0;z-index:1;background:var(--bg);border-left:1.5px solid var(--brd);padding:4px 10px}
.hmap tr.cur-price td:first-child{color:var(--blue);background:var(--blue-bg)}
.hmap tr.cur-price td:last-child{background:var(--blue-bg)}

/* ── Price range row ── */
.price-range-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── Options chain modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(15,23,42,.45);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeUp .2s ease-out;
}
.modal{
  background:var(--white);border-radius:18px;border:1px solid var(--brd);
  box-shadow:0 24px 64px rgba(0,0,0,.18),0 4px 16px rgba(0,0,0,.08);
  width:min(960px,100%);max-height:90vh;display:flex;flex-direction:column;
  overflow:hidden;animation:fadeUp .22s cubic-bezier(.4,0,.2,1);
}
.modal-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 24px;border-bottom:1px solid var(--brd);flex-shrink:0;
}
.modal-title{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.modal-sub{font-size:11.5px;color:var(--t3);margin-top:2px}
.modal-close{
  width:32px;height:32px;border-radius:8px;border:1.5px solid var(--brd);
  background:transparent;cursor:pointer;font-size:17px;color:var(--t3);
  display:flex;align-items:center;justify-content:center;transition:all var(--tr);
}
.modal-close:hover{background:var(--bg);color:var(--t1)}

/* Expiration bar */
.exp-bar{padding:14px 24px;border-bottom:1px solid var(--brd);flex-shrink:0}
.exp-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.exp-nav{display:flex;align-items:center;gap:6px}
.exp-arrow{flex-shrink:0;width:28px;height:28px;border-radius:7px;border:1.5px solid var(--brd);background:var(--white);cursor:pointer;font-size:18px;line-height:1;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:all var(--tr);padding:0}
.exp-arrow:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.exp-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;flex:1}
.exp-scroll::-webkit-scrollbar{height:3px}
.exp-scroll::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.exp-btn{
  flex-shrink:0;padding:5px 11px;border-radius:7px;border:1.5px solid var(--brd);
  background:var(--white);cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:600;
  color:var(--t2);transition:all var(--tr);white-space:nowrap;
}
.exp-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.exp-btn.active{border-color:var(--blue);background:var(--blue);color:#fff}


/* Chain table */
.chain-wrap{overflow:auto;flex:1}
.chain-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
.chain-tbl thead{position:sticky;top:0;z-index:10}
.chain-tbl .th-group{background:var(--bg);padding:7px 0;text-align:center;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--brd)}
.chain-tbl .th-group.call-hd{color:var(--blue)}
.chain-tbl .th-group.put-hd{color:var(--red)}
.chain-tbl .th-group.mid-hd{color:var(--t2)}
.chain-tbl .th-sub{background:var(--bg);padding:5px 10px;text-align:center;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t4);border-bottom:1.5px solid var(--brd)}
.chain-tbl .th-strike{background:var(--bg);text-align:center;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3)}
.chain-tbl td{padding:5px 10px;text-align:center;border-bottom:1px solid var(--brd-lt)}
.chain-tbl .td-strike{font-weight:700;font-size:12.5px;color:var(--t1);background:var(--bg);position:relative;text-align:center;border-left:1px solid var(--brd);border-right:1px solid var(--brd)}
.chain-tbl .td-mid{font-weight:700;color:var(--t1)}
.chain-tbl .td-dim{color:var(--t3)}
.chain-tbl tbody tr:hover .td-call{background:#EFF6FF}
.chain-tbl tbody tr:hover .td-put{background:#FEF2F2}
.chain-tbl tbody tr:hover .td-strike{background:var(--bg)}
.chain-tbl .td-call{cursor:pointer}
.chain-tbl .td-put{cursor:pointer}
.chain-tbl .td-call:hover{background:#DBEAFE !important}
.chain-tbl .td-put:hover{background:#FEE2E2 !important}
.chain-tbl tr.atm .td-strike{background:var(--blue-bg);color:var(--blue)}
.chain-tbl tr.atm .td-strike::before{content:"▶";position:absolute;left:6px;font-size:8px;color:var(--blue);top:50%;transform:translateY(-50%)}
.chain-tbl .itm-call{background:rgba(37,99,235,.04)}
.chain-tbl .itm-put{background:rgba(220,38,38,.04)}
.chain-tbl .td-muted{color:var(--t4)!important;opacity:.45;pointer-events:none}
.chain-tbl .td-inactive{opacity:.18;pointer-events:none}
.chain-tbl .td-preferred-buy{font-weight:700;color:var(--blue)!important}
.chain-tbl .td-preferred-sell{font-weight:700;color:var(--red)!important}
.chain-tbl .th-preferred-buy{color:var(--blue)!important;font-weight:800}
.chain-tbl .th-preferred-sell{color:var(--red)!important;font-weight:800}
.chain-tbl .th-muted{opacity:.38}
.chain-tbl .th-group.side-inactive{opacity:.25}
.chain-info{font-size:10.5px;color:var(--t4);padding:8px 24px;text-align:center;border-top:1px solid var(--brd);flex-shrink:0;font-family:var(--mono)}

/* Select option button */
.opt-select-btn{
  display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;
  border:1.5px solid var(--blue-brd);background:var(--blue-bg);cursor:pointer;
  font-family:var(--font);font-size:12px;font-weight:600;color:var(--blue);
  transition:all var(--tr);margin-top:11px;width:100%;justify-content:center;
}
.opt-select-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.selected-contract{
  margin-top:10px;padding:10px 13px;border-radius:9px;
  background:var(--bg);border:1px solid var(--brd);font-family:var(--mono);font-size:11.5px;
}
.sc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sc-row:last-child{margin-bottom:0}

/* ── API Call Counter ── */
.call-counter{
  display:flex;align-items:center;gap:7px;padding:5px 11px;
  border-radius:20px;border:1.5px solid var(--brd);background:var(--white);
  font-size:11px;font-weight:600;font-family:var(--mono);color:var(--t2);
  cursor:default;transition:all var(--tr);
}
.call-counter.warn{border-color:var(--amber-brd);background:var(--amber-bg);color:var(--amber)}
.call-counter.over{border-color:var(--red-brd);background:var(--red-bg);color:var(--red)}
.call-bar-wrap{width:52px;height:5px;border-radius:3px;background:var(--brd);overflow:hidden}
.call-bar{height:100%;border-radius:3px;transition:width .4s ease,background .4s ease}

/* ── Toast notifications ── */
.toast-stack{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{
  display:flex;align-items:flex-start;gap:11px;
  padding:14px 16px;border-radius:13px;min-width:290px;max-width:360px;
  background:var(--white);border:1.5px solid var(--brd);
  box-shadow:var(--shadow-md);pointer-events:all;
  animation:slideIn .3s cubic-bezier(.4,0,.2,1) forwards;
}
.toast.out{animation:slideOut .3s cubic-bezier(.4,0,.2,1) forwards}
.toast-icon{font-size:18px;line-height:1;flex-shrink:0;margin-top:1px}
.toast-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:3px}
.toast-msg{font-size:11.5px;color:var(--t3);line-height:1.5}
.toast-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--t4);font-size:16px;line-height:1;padding:0 0 0 6px;flex-shrink:0}
.toast-close:hover{color:var(--t2)}

/* ── Mobile responsive ── */
@media (max-width:640px){
  /* Header */
  .hdr{padding:0 14px;height:52px}
  .logo-sub{display:none}
  .hdr-meta{display:none}
  .call-counter{display:none}
  .live-pill{padding:4px 9px;font-size:10px}

  /* Strategy bar */
  .strat-bar{padding:0 4px;overflow-x:auto}
  .sbtn{padding:10px 10px;gap:5px;flex:0 0 auto}
  .sbtn .stag{display:none}
  .strat-desc{padding:8px 14px;font-size:11.5px}

  /* Page: single column */
  .page{grid-template-columns:1fr;padding:14px 12px;gap:14px}

  /* Card padding */
  .cp{padding:15px 14px}

  /* Metrics: 2 columns */
  .metrics{grid-template-columns:repeat(2,1fr);gap:10px}
  .mc-val{font-size:20px}

  /* Greeks: 3 columns */
  .greeks{grid-template-columns:repeat(3,1fr)}

  /* P&L table: allow horizontal scroll */
  .hmap-wrap{max-height:360px}

  /* Expiration table */
  .etbl{font-size:12px}
  .etbl thead th,.etbl td{padding:8px 10px}

  /* Price range inputs stacked */
  .price-range-row{grid-template-columns:1fr}

  /* Modal: full-screen bottom sheet */
  .modal-overlay{padding:0;align-items:flex-end;backdrop-filter:blur(4px)}
  .modal{
    width:100%;max-height:94vh;
    border-radius:20px 20px 0 0;
  }
  .modal-hd{padding:14px 16px}
  .modal-title{font-size:14px}
  .modal-sub{font-size:10.5px}
  .exp-bar{padding:10px 14px}
  .chain-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .chain-info{padding:6px 14px}

  /* Toast: full width */
  .toast-stack{left:10px;right:10px;bottom:10px}

  /* Empty state */
  .empty{padding:40px 18px;min-height:260px}
  .empty-h{font-size:18px}
  .empty-p{font-size:13px}
}

@media (max-width:400px){
  .sbtn{padding:9px 8px;font-size:11.5px}
  .metrics{grid-template-columns:1fr 1fr}
  .greeks{grid-template-columns:repeat(2,1fr)}
}

/* ─────────────────────────────────────────
   STOCK SEARCH
───────────────────────────────────────── */
function StockSearch({onSelect,selected,onCall}){
  const{sr,sl,search,quote,ql,qe}=useFinnhub({onCall});
  const[nameQ,setNameQ]=useState("");
  const[tickerQ,setTickerQ]=useState("");
  const[showDD,setShowDD]=useState(false);
  const ddRef=useRef(null),inputRef=useRef(null);

  useEffect(()=>{
    const h=e=>{
      if(ddRef.current&&!ddRef.current.contains(e.target)&&inputRef.current&&!inputRef.current.contains(e.target))setShowDD(false);
    };
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  const pick=async(sym,name)=>{
    setNameQ(name||sym);setTickerQ(sym);setShowDD(false);
    const d=await quote(sym);if(d)onSelect(d);
  };
  const go=async()=>{
    if(!tickerQ.trim())return;
    const d=await quote(tickerQ.trim().toUpperCase());
    if(d){setNameQ(d.name);onSelect(d);}
  };

  return(
    <div className="card cp fu">
      <div className="slabel">Select Instrument</div>

      <div className="field" style={{marginBottom:11,position:"relative"}}>
        <label className="flabel">Search by Name</label>
        <div className="inp-wrap">
          <svg className="inp-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input ref={inputRef} className="inp" placeholder="Apple, Tesla, NVIDIA…"
            value={nameQ}
            onChange={e=>{setNameQ(e.target.value);search(e.target.value);setShowDD(true);}}
            onFocus={()=>nameQ&&setShowDD(true)}
            style={{paddingLeft:34}}/>
          {sl&&<div style={{position:"absolute",right:10,top:"50%",marginTop:-7.5}}><div className="spin"/></div>}
          {showDD&&sr.length>0&&(
            <div ref={ddRef} className="dd">
              {sr.map(r=>(
                <div key={r.symbol} className="ddi" onClick={()=>pick(r.symbol,r.description)}>
                  <span className="dd-tick">{r.symbol}</span>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:12.5,fontWeight:500,color:"var(--t1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description}</div>
                    <div style={{fontSize:10,color:"var(--t4)",marginTop:1}}>{r.type}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      <div className="divor"><span>or</span></div>

      <div className="field">
        <label className="flabel">Enter Ticker</label>
        <div style={{display:"flex",gap:8}}>
          <input className="inp" placeholder="AAPL" value={tickerQ}
            onChange={e=>setTickerQ(e.target.value.toUpperCase())}
            onKeyDown={e=>e.key==="Enter"&&go()}
            style={{flex:1,fontWeight:700,letterSpacing:".05em"}}/>
          <button className="btn" onClick={go} disabled={ql}>{ql?"···":"Look Up"}</button>
        </div>
      </div>

      {qe&&<div className="err">{qe}</div>}

      {selected&&(
        <div className="stock-chip">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:9.5,fontWeight:700,color:"var(--blue)",letterSpacing:".09em",textTransform:"uppercase",marginBottom:3}}>Selected</div>
              <div style={{display:"flex",alignItems:"baseline",gap:7}}>
                <span style={{fontFamily:"var(--mono)",fontSize:18,fontWeight:800,color:"var(--t1)",letterSpacing:"-.02em"}}>{selected.symbol}</span>
                <span style={{fontSize:11,color:"var(--t3)",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selected.name}</span>
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontFamily:"var(--mono)",fontSize:20,fontWeight:700,color:"var(--t1)",letterSpacing:"-.02em"}}>${selected.price.toFixed(2)}</div>
              <div style={{fontFamily:"var(--mono)",fontSize:11.5,fontWeight:600,color:selected.change>=0?"var(--green)":"var(--red)"}}>
                {selected.change>=0?"+":""}{selected.change.toFixed(2)}{" "}
                <span style={{opacity:.75}}>({selected.changePct>=0?"+":""}{selected.changePct.toFixed(2)}%)</span>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:16,marginTop:9}}>
            {[["O",selected.open],["H",selected.high],["L",selected.low],["PC",selected.prevClose]].map(([l,v])=>(
              <div key={l} style={{fontSize:10.5,color:"var(--t3)"}}>
                {l}{" "}<span style={{fontFamily:"var(--mono)",fontWeight:600,color:"var(--t2)"}}>${v?.toFixed(2)}</span>
              </div>
            ))}
          </div>
          {selected.industry&&<div style={{marginTop:7,fontSize:10.5,color:"var(--t3)"}}>{selected.industry}{selected.cap?` · $${(selected.cap/1000).toFixed(1)}B cap`:""}</div>}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────
   SELECTED CONTRACT BADGE
───────────────────────────────────────── */
function ContractBadge({contract,onClear}){
  if(!contract)return null;
  const side=contract.side==='call'?'Call':'Put';
  const color=contract.side==='call'?'var(--blue)':'var(--red)';
  const bg=contract.side==='call'?'var(--blue-bg)':'var(--red-bg)';
  const brd=contract.side==='call'?'var(--blue-brd)':'var(--red-brd)';
  return(
    <div className="selected-contract" style={{border:`1px solid ${brd}`,background:bg}}>
      <div className="sc-row">
        <span style={{fontSize:10,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',color}}>Selected Contract</span>
        <button onClick={onClear} style={{background:'none',border:'none',cursor:'pointer',color:'var(--t4)',fontSize:13,padding:0}}>✕</button>
      </div>
      <div className="sc-row" style={{marginTop:4}}>
        <span style={{fontSize:13,fontWeight:800,color}}>${contract.strike.toFixed(0)} {side}</span>
        <span style={{color:'var(--t3)',fontSize:11}}>{contract.expiration}</span>
      </div>
      <div className="sc-row" style={{marginTop:2}}>
        <span style={{color:'var(--t3)',fontSize:10.5}}>
          Mid <span style={{color:'var(--t1)',fontWeight:600}}>${contract.mid?.toFixed(2)??'—'}</span>
          {' '}· Bid ${contract.bid?.toFixed(2)??'—'}
          {' '}· Ask ${contract.ask?.toFixed(2)??'—'}
        </span>
      </div>
      {contract.delta!=null&&(
        <div style={{marginTop:4,fontSize:10,color:'var(--t3)'}}>
          Δ {contract.delta?.toFixed(3)}
          {contract.iv!=null&&<span style={{marginLeft:8}}>IV {(contract.iv*100).toFixed(1)}%</span>}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────
   PARAM INPUT
───────────────────────────────────────── */
function PInput({label,value,onChange,prefix,suffix,step=1,min=0}){
  return(
    <div className="field">
      <label className="flabel">{label}</label>
      <div className="inp-wrap">
        {prefix&&<span className="inp-pfx">{prefix}</span>}
        <input type="number" className="inp" value={value}
          onChange={e=>onChange(parseFloat(e.target.value)||0)}
          step={step} min={min}
          style={{paddingLeft:prefix?25:12,paddingRight:suffix?40:12}}/>
        {suffix&&<span className="inp-sfx">{suffix}</span>}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   PNL CHART
───────────────────────────────────────── */
function PnLChart({strategy,params,dte,minPrice,maxPrice}){
  const canvasRef=useRef(null);
  const[tip,setTip]=useState(null);
  const[dims,setDims]=useState({w:800,h:360});
  const{stockPrice}=params;
  const range=stockPrice*0.4;
  const minP=minPrice>0?minPrice:Math.max(stockPrice-range,.01);
  const maxP=maxPrice>minP?maxPrice:stockPrice+range;
  const N=280;
  const PAD={t:50,r:24,b:44,l:80};

  const slices=useMemo(()=>[
    {d:dte,                   label:`Today (${dte}d)`,              color:"#2563EB",w:1.5},
    {d:Math.round(dte*.5),    label:`${Math.round(dte*.5)}d left`,  color:"#D97706",w:1.5},
    {d:Math.round(dte*.2),    label:`${Math.round(dte*.2)}d left`,  color:"#EA580C",w:1.5},
    {d:0,                     label:"At Expiry",                    color:"#059669",w:2.5},
  ].map(c=>({
    ...c,
    pts:Array.from({length:N+1},(_,i)=>{
      const price=minP+(maxP-minP)*(i/N);
      return{price,pnl:pnl(strategy,params,price,c.d)};
    }),
  })),[strategy,params,dte,minP,maxP]);

  const allP=slices.flatMap(s=>s.pts.map(p=>p.pnl));
  const rMin=Math.min(...allP),rMax=Math.max(...allP);
  const pad=(rMax-rMin)*.15||100;
  const yLo=rMin-pad,yHi=rMax+pad;

  const draw=useCallback(()=>{
    const c=canvasRef.current;if(!c)return;
    const dpr=window.devicePixelRatio||1;
    const rect=c.getBoundingClientRect();
    c.width=rect.width*dpr;c.height=rect.height*dpr;
    const ctx=c.getContext("2d");ctx.scale(dpr,dpr);
    const W=rect.width,H=rect.height;
    setDims({w:W,h:H});
    const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
    const toX=p=>PAD.l+((p-minP)/(maxP-minP))*cw;
    const toY=v=>PAD.t+(1-(v-yLo)/(yHi-yLo))*ch;

    // White background
    ctx.fillStyle="#FFFFFF";
    ctx.fillRect(0,0,W,H);

    ctx.font="11px 'JetBrains Mono',monospace";

    // Y grid + labels
    for(let i=0;i<=5;i++){
      const val=yLo+(yHi-yLo)*i/5,y=toY(val);
      ctx.strokeStyle="rgba(15,23,42,.07)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
      ctx.fillStyle="#1E293B";ctx.textAlign="right";
      ctx.fillText(`${val>=0?"+":""}$${val.toFixed(0)}`,PAD.l-8,y+4);
    }
    // X labels
    for(let i=0;i<=6;i++){
      const val=minP+(maxP-minP)*i/6,x=toX(val);
      ctx.fillStyle="#1E293B";ctx.textAlign="center";
      ctx.fillText(`$${val.toFixed(0)}`,x,H-PAD.b+16);
    }
    // Zero line
    if(yLo<0&&yHi>0){
      const y0=toY(0);
      ctx.strokeStyle="#CBD5E1";ctx.lineWidth=1;
      ctx.setLineDash([7,5]);ctx.beginPath();ctx.moveTo(PAD.l,y0);ctx.lineTo(W-PAD.r,y0);ctx.stroke();ctx.setLineDash([]);
    }
    // Current price line
    const cpx=toX(stockPrice);
    ctx.strokeStyle="rgba(15,23,42,.35)";ctx.lineWidth=1;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(cpx,PAD.t);ctx.lineTo(cpx,H-PAD.b);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="#0F172A";ctx.font="10.5px 'JetBrains Mono',monospace";ctx.textAlign="center";
    ctx.fillText(`$${stockPrice.toFixed(2)}`,cpx,PAD.t-10);

    // Fill under expiry curve
    const exp=slices[slices.length-1],y0=toY(0);
    for(let i=0;i<exp.pts.length-1;i++){
      const a=exp.pts[i],b=exp.pts[i+1],profit=(a.pnl+b.pnl)/2>=0;
      ctx.fillStyle=profit?"rgba(5,150,105,.07)":"rgba(220,38,38,.06)";
      ctx.beginPath();ctx.moveTo(toX(a.price),toY(a.pnl));
      ctx.lineTo(toX(b.price),toY(b.pnl));ctx.lineTo(toX(b.price),y0);ctx.lineTo(toX(a.price),y0);ctx.closePath();ctx.fill();
    }
    // Curves
    for(const s of slices){
      ctx.strokeStyle=s.color;ctx.lineWidth=s.w;ctx.lineJoin="round";
      ctx.beginPath();
      s.pts.forEach((p,i)=>{const x=toX(p.price),y=toY(p.pnl);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke();
    }
  },[slices,stockPrice,minP,maxP,yLo,yHi]);

  useEffect(()=>{draw();},[draw]);
  useEffect(()=>{const h=()=>draw();window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[draw]);

  const onMouse=e=>{
    const r=canvasRef.current?.getBoundingClientRect();if(!r)return;
    const mx=e.clientX-r.left,rel=(mx-PAD.l)/(r.width-PAD.l-PAD.r);
    if(rel<0||rel>1){setTip(null);return;}
    const price=minP+rel*(maxP-minP),idx=Math.round(rel*N);
    setTip({x:mx,y:e.clientY-r.top,price,lines:slices.map(s=>({label:s.label,pnl:s.pts[Math.min(idx,s.pts.length-1)].pnl,color:s.color}))});
  };

  return(
    <div style={{position:"relative",width:"100%",height:360}}>
      <canvas ref={canvasRef} style={{width:"100%",height:"100%",cursor:"crosshair",borderRadius:"0 0 13px 13px"}}
        onMouseMove={onMouse} onMouseLeave={()=>setTip(null)}/>
      <div style={{position:"absolute",top:6,right:12}} className="chart-legend">
        {slices.map((s,i)=>(
          <div key={i} className="cl-item" style={{color:s.color}}>
            <div className="cl-line" style={{background:s.color}}/>
            <span style={{fontWeight:600}}>{s.label}</span>
          </div>
        ))}
      </div>
      {tip&&(
        <div style={{
          position:"absolute",left:Math.min(tip.x+14,dims.w-195),top:Math.max(tip.y-16,0),
          background:"#FFFFFF",border:"1.5px solid var(--brd)",borderRadius:11,
          padding:"11px 14px",fontSize:11.5,fontFamily:"var(--mono)",color:"var(--t1)",
          pointerEvents:"none",zIndex:20,minWidth:190,boxShadow:"var(--shadow-md)",
        }}>
          <div style={{fontWeight:600,marginBottom:8,color:"var(--t3)",fontSize:9.5,textTransform:"uppercase",letterSpacing:".08em"}}>
            Stock Price: <span style={{color:"var(--t1)",fontSize:13}}>${tip.price.toFixed(2)}</span>
          </div>
          {tip.lines.map((l,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",gap:18,marginBottom:3}}>
              <span style={{color:l.color,fontWeight:500}}>{l.label}</span>
              <span style={{color:l.pnl>=0?"var(--green)":"var(--red)",fontWeight:700}}>
                {l.pnl>=0?"+":""}${l.pnl.toFixed(0)}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────
   HEAT MAP TABLE
───────────────────────────────────────── */
function HeatMapTable({strategy,params,dte,minPrice,maxPrice}){
  const{stockPrice,contracts,premium}=params;
  const n=contracts*100;

  // Auto step size based on range
  const range=maxPrice-minPrice;
  const step=range<=15?0.5:range<=40?1:range<=80?2.5:5;

  // Price rows: high → low
  const prices=[];
  for(let p=maxPrice;p>=minPrice-0.001;p-=step){
    prices.push(Math.round(p*100)/100);
  }

  // DTE columns: current DTE → 0 (expiry), max ~12 cols
  const numCols=Math.min(12,dte+1);
  const dteCols=Array.from({length:numCols},(_,i)=>
    Math.round(dte*(numCols-1-i)/(numCols-1))
  );
  if(dteCols[dteCols.length-1]!==0)dteCols[dteCols.length-1]=0;

  // Compute all P&L values
  const rows=prices.map(price=>({
    price,
    cells:dteCols.map(d=>pnl(strategy,params,price,d)),
    expiryPnl:pnl(strategy,params,price,0),
  }));

  // Color scale
  const allVals=rows.flatMap(r=>r.cells);
  const maxAbs=Math.max(Math.abs(Math.min(...allVals)),Math.abs(Math.max(...allVals)),1);

  const cellStyle=(val)=>{
    const t=Math.min(Math.abs(val)/maxAbs,1);
    const alpha=0.08+t*0.72;
    return val>=0
      ?{background:`rgba(5,150,105,${alpha})`,color:t>0.55?"#ECFDF5":"#065F46"}
      :{background:`rgba(220,38,38,${alpha})`,color:t>0.55?"#FEF2F2":"#7F1D1D"};
  };

  const basis=premium*n;

  return(
    <div className="hmap-wrap">
      <table className="hmap">
        <thead>
          <tr>
            <th>Price</th>
            {dteCols.map(d=>(
              <th key={d}>{d===0?"Exp":`${d}d`}</th>
            ))}
            <th>+/-%</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(row=>{
            const isCur=Math.abs(row.price-stockPrice)<step*0.6;
            const pct=basis>0?(row.expiryPnl/basis)*100:0;
            return(
              <tr key={row.price} className={isCur?"cur-price":""}>
                <td>
                  ${row.price.toFixed(step<1?2:step===1?2:2)}
                  {isCur&&<span style={{marginLeft:5,fontSize:8.5,fontWeight:700,color:"var(--blue)",background:"var(--blue-bg)",border:"1px solid var(--blue-brd)",padding:"1px 4px",borderRadius:3}}>NOW</span>}
                </td>
                {row.cells.map((val,i)=>(
                  <td key={i} style={cellStyle(val)}>
                    {val>=0?"+":""}{val.toFixed(0)}
                  </td>
                ))}
                <td style={{fontWeight:700,color:pct>=0?"var(--green)":"var(--red)"}}>
                  {pct>=0?"+":""}{pct.toFixed(1)}%
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ─────────────────────────────────────────
   OPTIONS CHAIN MODAL
───────────────────────────────────────── */
function fmt(v){return v==null?"—":v.toFixed(2)}

const STRATEGY_META={
  long_call:        {label:'Long Call',        side:'call',buying:true },
  long_put:         {label:'Long Put',         side:'put', buying:true },
  covered_call:     {label:'Covered Call',     side:'call',buying:false},
  cash_secured_put: {label:'Cash-Secured Put', side:'put', buying:false},
};

function OptionsChainModal({symbol,stockPrice,onSelect,onClose,onCall,strategy}){
  const meta=STRATEGY_META[strategy]||{label:'',side:'call',buying:true};
  const{label:strategyLabel,side:relevantSide,buying}=meta;

  // Per-column class helpers
  const subHdr=(side,col)=>{
    if(side!==relevantSide) return 'th-sub th-muted';
    if(buying  && col==='ask') return 'th-sub th-preferred-buy';
    if(!buying && col==='bid') return 'th-sub th-preferred-sell';
    if(col==='mid') return 'th-sub';
    return 'th-sub th-muted';
  };
  const cellCls=(side,col,itmCls)=>{
    const base=side==='call'?'td-call':'td-put';
    const itm=itmCls?` ${itmCls}`:'';
    if(side!==relevantSide) return `${base} td-inactive${itm}`;
    if(buying){
      if(col==='bid') return `${base} td-muted${itm}`;
      if(col==='mid') return `${base} td-mid${itm}`;
      if(col==='ask') return `${base} td-preferred-buy${itm}`;
    } else {
      if(col==='bid') return `${base} td-preferred-sell${itm}`;
      if(col==='mid') return `${base} td-mid${itm}`;
      if(col==='ask') return `${base} td-muted${itm}`;
    }
    return `${base}${itm}`;
  };

  const[expirations,setExpirations]=useState([]);
  const[selExp,setSelExp]=useState(null);
  const[rows,setRows]=useState([]);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const expCache=useRef({});

  // Load expirations on mount
  useEffect(()=>{
    setLoading(true);setError("");
    onCall?.('options');
    fetch(`/api/options?symbol=${encodeURIComponent(symbol)}&mode=expirations`)
      .then(r=>r.json())
      .then(d=>{
        if(d.error)throw new Error(d.error);
        setExpirations(d.expirations||[]);
        if(d.expirations?.length) setSelExp(d.expirations[0]);
      })
      .catch(e=>setError(e.message))
      .finally(()=>setLoading(false));
  },[symbol]);

  // Load chain when expiration changes
  useEffect(()=>{
    if(!selExp)return;
    if(expCache.current[selExp]){setRows(expCache.current[selExp]);return;}
    setLoading(true);setError("");
    onCall?.('options');
    fetch(`/api/options?symbol=${encodeURIComponent(symbol)}&mode=chain&expiration=${selExp}`)
      .then(r=>r.json())
      .then(d=>{
        if(d.error)throw new Error(d.error);
        expCache.current[selExp]=d.rows||[];
        setRows(d.rows||[]);
      })
      .catch(e=>setError(e.message))
      .finally(()=>setLoading(false));
  },[selExp,symbol]);

  // Format expiration label: "2026-04-17" → "Apr 17/26"
  const fmtExp=s=>{
    const[y,m,d]=s.split('-');
    const months=["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return`${months[+m]} ${+d}/${y.slice(2)}`;
  };

  // Days to expiry from YYYY-MM-DD string
  const dteFromExp=s=>{
    const exp=new Date(s+'T16:00:00');
    return Math.max(0,Math.round((exp-Date.now())/(1000*60*60*24)));
  };

  const dte=selExp?dteFromExp(selExp):0;
  const expScrollRef=useRef(null);
  const scrollExp=dir=>expScrollRef.current?.scrollBy({left:dir*240,behavior:'smooth'});

  // Close on overlay click
  const overlayClick=e=>{if(e.target===e.currentTarget)onClose();};

  // Keyboard close
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[onClose]);

  // ATM row = closest strike to current price
  const atmStrike=rows.length?rows.reduce((best,r)=>
    Math.abs(r.strike-stockPrice)<Math.abs(best.strike-stockPrice)?r:best
  ,rows[0])?.strike:null;

  // Auto-scroll to ATM
  const atmRef=useRef(null);
  useEffect(()=>{
    if(atmRef.current)atmRef.current.scrollIntoView({block:'center',behavior:'smooth'});
  },[rows,atmStrike]);

  const pick=(row,side)=>{
    const c=row[side];
    if(!c)return;
    onSelect({
      side,
      strike:    row.strike,
      mid:       c.mid,
      bid:       c.bid,
      ask:       c.ask,
      iv:        c.iv,
      delta:     c.delta,
      theta:     c.theta,
      dte,
      expiration:selExp,
      symbol:    c.symbol,
    });
    onClose();
  };

  return(
    <div className="modal-overlay" onClick={overlayClick}>
      <div className="modal">

        {/* Header */}
        <div className="modal-hd">
          <div>
            <div className="modal-title">{strategyLabel} — {symbol}</div>
            <div className="modal-sub">
              {symbol} @ ${stockPrice.toFixed(2)} · {buying
                ? 'Buying — click the Ask or Mid column to select'
                : 'Selling — click the Bid or Mid column to select'}
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {/* Expiration selector */}
        <div className="exp-bar">
          <div className="exp-label">Expiration date</div>
          <div className="exp-nav">
            <button className="exp-arrow" onClick={()=>scrollExp(-1)}>‹</button>
            <div className="exp-scroll" ref={expScrollRef}>
              {expirations.map(e=>(
                <button key={e} className={`exp-btn${selExp===e?' active':''}`}
                  onClick={()=>setSelExp(e)}>
                  {fmtExp(e)}
                  <span style={{fontSize:9,marginLeft:4,color:selExp===e?'#fff':'var(--red)',opacity:selExp===e?1:.8}}>
                    {dteFromExp(e)}d
                  </span>
                </button>
              ))}
            </div>
            <button className="exp-arrow" onClick={()=>scrollExp(1)}>›</button>
          </div>
        </div>

        {/* Chain table */}
        <div className="chain-wrap">
          {loading&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:60,color:'var(--t3)',fontSize:13}}>
              <div className="spin"/><span>Loading options chain…</span>
            </div>
          )}
          {error&&!loading&&(
            <div style={{padding:40,textAlign:'center',color:'var(--red)',fontSize:13}}>{error}</div>
          )}
          {!loading&&!error&&rows.length>0&&(
            <table className="chain-tbl">
              <thead>
                <tr>
                  <th colSpan={3} className={`th-group call-hd${relevantSide!=='call'?' side-inactive':''}`}>Calls</th>
                  <th className="th-group mid-hd th-strike">Strike</th>
                  <th colSpan={3} className={`th-group put-hd${relevantSide!=='put'?' side-inactive':''}`}>Puts</th>
                </tr>
                <tr>
                  {['Bid','Mid','Ask'].map(h=>(
                    <th key={'c'+h} className={subHdr('call',h.toLowerCase())}>{h}</th>
                  ))}
                  <th className="th-sub th-strike">$</th>
                  {['Bid','Mid','Ask'].map(h=>(
                    <th key={'p'+h} className={subHdr('put',h.toLowerCase())}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map(row=>{
                  const c=row.call,p=row.put;
                  const isAtm=row.strike===atmStrike;
                  const itmCall=stockPrice>row.strike;
                  const itmPut=stockPrice<row.strike;
                  return(
                    <tr key={row.strike} className={isAtm?'atm':''} ref={isAtm?atmRef:null}>
                      {/* Call side */}
                      <td className={cellCls('call','bid',itmCall?'itm-call':'')} onClick={()=>pick(row,'call')}>{fmt(c?.bid)}</td>
                      <td className={cellCls('call','mid',itmCall?'itm-call':'')} onClick={()=>pick(row,'call')}>{fmt(c?.mid)}</td>
                      <td className={cellCls('call','ask',itmCall?'itm-call':'')} onClick={()=>pick(row,'call')}>{fmt(c?.ask)}</td>
                      {/* Strike */}
                      <td className="td-strike">${row.strike.toFixed(2)}</td>
                      {/* Put side */}
                      <td className={cellCls('put','bid',itmPut?'itm-put':'')} onClick={()=>pick(row,'put')}>{fmt(p?.bid)}</td>
                      <td className={cellCls('put','mid',itmPut?'itm-put':'')} onClick={()=>pick(row,'put')}>{fmt(p?.mid)}</td>
                      <td className={cellCls('put','ask',itmPut?'itm-put':'')} onClick={()=>pick(row,'put')}>{fmt(p?.ask)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>

        {/* Footer */}
        <div className="chain-info">
          Options prices are delayed 15 min · {buying?'Buying — click Ask or Mid':'Selling — click Bid or Mid'} · {dte}d to expiry
        </div>

      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   IMPLIED VOLATILITY — bisection solver
   Finds the IV that makes BS price = market price
───────────────────────────────────────── */
function impliedVol(marketPrice, S, K, T, r, type){
  if(T<=0||marketPrice<=0||S<=0||K<=0) return 0.30;
  // Can't solve if price is at/below intrinsic
  const intrinsic=type==='call'?Math.max(S-K,0):Math.max(K-S,0);
  if(marketPrice<=intrinsic+0.001) return 0.001;
  let lo=0.001, hi=5.0;
  for(let i=0;i<300;i++){
    const mid=(lo+hi)/2;
    const price=bsPrice(S,K,T,r,mid,type);
    if(price<marketPrice) lo=mid; else hi=mid;
    if(hi-lo<0.00005) break;
  }
  return(lo+hi)/2;
}

/* ─────────────────────────────────────────
   HELPERS
───────────────────────────────────────── */
// Smart price range based on directional bias
function autoRange(sp, strat){
  const bullish = strat==='long_call' || strat==='cash_secured_put';
  return bullish
    ? { low: Math.round(sp*0.93*2)/2, high: Math.round(sp*1.22*2)/2 }  // -7% / +22%
    : { low: Math.round(sp*0.77*2)/2, high: Math.round(sp*1.07*2)/2 }; // -23% / +7%
}

// Derive strategy from action (buy/write) + side (call/put)
function deriveStrategy(action, side){
  if(action==='buy')   return side==='call' ? 'long_call'    : 'long_put';
  if(action==='write') return side==='call' ? 'covered_call' : 'cash_secured_put';
  return 'long_call';
}

function OptionsLab(){
  const[strategy,setStrategy]=useState("long_put");
  const[selected,setSelected]=useState(null);
  const[strike,setStrike]=useState(170);
  const[premium,setPremium]=useState(3.50);
  const[contracts,setContracts]=useState(1);
  const[dte,setDte]=useState(30);
  const[iv,setIv]=useState(30);
  const[rfr,setRfr]=useState(5.0);
  const[priceLow,setPriceLow]=useState(0);
  const[priceHigh,setPriceHigh]=useState(0);
  const[priceRangeManual,setPriceRangeManual]=useState(false);
  const[chartView,setChartView]=useState("chart");
  const[showOptionsModal,setShowOptionsModal]=useState(false);
  const[selectedContract,setSelectedContract]=useState(null);
  const[contractAction,setContractAction]=useState('buy'); // 'buy' | 'write'

  // Auto price range when strategy or stock price changes (if not manually overridden)
  const sp=selected?.price||0;
  useEffect(()=>{
    if(!sp||priceRangeManual) return;
    const{low,high}=autoRange(sp,strategy);
    setPriceLow(low);
    setPriceHigh(high);
  },[sp,strategy,priceRangeManual]);

  // Derive strategy when contractAction or selected contract's side changes
  useEffect(()=>{
    if(!selectedContract) return;
    setStrategy(deriveStrategy(contractAction, selectedContract.side));
  },[contractAction, selectedContract]);

  const handleOptionSelect=useCallback((opt)=>{
    const derived=deriveStrategy(contractAction, opt.side);
    setStrategy(derived);
    setStrike(opt.strike);
    const mktPrice=parseFloat((opt.mid??opt.ask??0).toFixed(2));
    setPremium(mktPrice);
    const daysLeft=opt.dte??30;
    setDte(daysLeft);

    // IV: use API value if valid, otherwise back-calculate from market price
    if(opt.iv!=null && opt.iv>0.005){
      setIv(Math.round(opt.iv*100*10)/10); // round to 1 decimal
    } else if(mktPrice>0 && sp>0){
      const T=daysLeft/365;
      const side=opt.side==='call'?'call':'put';
      const calcIV=impliedVol(mktPrice, sp, opt.strike, T, rfr/100, side);
      setIv(Math.round(calcIV*100*10)/10);
    }

    setSelectedContract(opt);
    // Always auto-recalculate range when a contract is freshly selected
    if(sp){
      const{low,high}=autoRange(sp,derived);
      setPriceLow(low);
      setPriceHigh(high);
      setPriceRangeManual(false);
    }
  },[contractAction, sp, rfr]);

  // API call tracking
  const tracker=useCallTracker();
  const[toasts,setToasts]=useState([]);
  const prevStatus=useRef('ok');

  const addToast=useCallback((icon,title,msg)=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,icon,title,msg,out:false}]);
    setTimeout(()=>setToasts(t=>t.map(x=>x.id===id?{...x,out:true}:x)),6000);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),6350);
  },[]);

  const handleApiCall=useCallback((endpoint)=>{
    tracker.increment(endpoint);
  },[tracker.increment]);

  // Fire toasts when threshold is crossed
  useEffect(()=>{
    if(tracker.status==='warn'&&prevStatus.current==='ok'){
      addToast('⚠️','Approaching API Limit',
        `${tracker.count} of ${tracker.limit} daily calls used (${Math.round(tracker.pct)}%). Consider upgrading your plan.`);
    }
    if(tracker.status==='over'&&prevStatus.current!=='over'){
      addToast('🚨','Daily API Limit Reached',
        `${tracker.count} calls made today. Free tier limit is ${tracker.limit}/day. Requests may start failing.`);
    }
    prevStatus.current=tracker.status;
  },[tracker.status,tracker.count]);

  const st=STRATS[strategy];
  const params={strike,premium,contracts,stockPrice:sp,iv,rfr};
  const n=contracts*100;

  const summary=useMemo(()=>{
    if(!sp)return null;
    let mp,ml,be;
    if(strategy==="long_call")       {mp="∞";ml=(premium*n).toFixed(2);be=(strike+premium).toFixed(2);}
    else if(strategy==="long_put")   {mp=((strike-premium)*n).toFixed(2);ml=(premium*n).toFixed(2);be=(strike-premium).toFixed(2);}
    else if(strategy==="covered_call"){mp=((strike-sp+premium)*n).toFixed(2);ml=((sp-premium)*n).toFixed(2);be=(sp-premium).toFixed(2);}
    else                             {mp=(premium*n).toFixed(2);ml=((strike-premium)*n).toFixed(2);be=(strike-premium).toFixed(2);}
    return{mp,ml,be,cur:pnl(strategy,params,sp,dte)};
  },[strategy,sp,strike,premium,n,dte,params]);

  const greeks=useMemo(()=>{
    if(!sp)return null;
    return bsGreeks(sp,strike,dte/365,rfr/100,iv/100,strategy.includes("call")?"call":"put");
  },[sp,strike,dte,iv,rfr,strategy]);

  const metrics=summary?[
    {label:"Max Profit", val:summary.mp==="∞"?"∞":`$${summary.mp}`, color:"var(--green)", bar:"var(--green)", sub:"Best case at expiry"},
    {label:"Max Loss",   val:`-$${summary.ml}`,                      color:"var(--red)",   bar:"var(--red)",   sub:`Premium paid · ${contracts} contract${contracts!==1?"s":""}`},
    {label:"Breakeven",  val:`$${summary.be}`,                       color:"var(--amber)", bar:"var(--amber)", sub:"At expiry only — not before"},
    {label:"Current P&L",val:`${summary.cur>=0?"+":""}$${Math.abs(summary.cur).toFixed(2)}`,
      color:summary.cur>=0?"var(--green)":"var(--red)",
      bar:summary.cur>=0?"var(--green)":"var(--red)",
      sub:"Mark-to-market today"},
  ]:[];

  const greekDefs=greeks?[
    {l:"Delta",v:greeks.delta.toFixed(4),c:"#2563EB",hint:"Price sensitivity"},
    {l:"Gamma",v:greeks.gamma.toFixed(6),c:"#7C3AED",hint:"Delta change rate"},
    {l:"Theta",v:greeks.theta.toFixed(4),c:"#EA580C",hint:"Daily time decay"},
    {l:"Vega", v:greeks.vega.toFixed(4), c:"#0891B2",hint:"IV sensitivity"},
    {l:"Rho",  v:greeks.rho.toFixed(4),  c:"#BE185D",hint:"Rate sensitivity"},
  ]:[];

  return(
    <div className="app">
      <style>{CSS}</style>

      {/* ── Header ── */}
      <header className="hdr">
        <div className="logo-wrap">
          <div className="logo-mark">OL</div>
          <div>
            <div className="logo-name">OptionsLab</div>
            <div className="logo-sub">Professional Options Calculator</div>
          </div>
        </div>
        <div className="hdr-right">
          <div className="live-pill"><div className="live-dot"/>Live Data</div>
          {/* API call counter */}
          <div className={`call-counter${tracker.status==='warn'?' warn':tracker.status==='over'?' over':''}`}
            title={`${tracker.count} of ${tracker.limit} API calls used today. Resets at midnight.\nLast: ${tracker.history.length?new Date(tracker.history[tracker.history.length-1].time).toLocaleTimeString():'—'}`}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <span>{tracker.count}<span style={{opacity:.5}}>/{tracker.limit}</span></span>
            <div className="call-bar-wrap">
              <div className="call-bar" style={{
                width:`${tracker.pct}%`,
                background:tracker.status==='over'?'var(--red)':tracker.status==='warn'?'var(--amber)':'var(--green)'
              }}/>
            </div>
            {tracker.count>0&&(
              <button onClick={e=>{e.stopPropagation();tracker.reset();}}
                title="Reset counter"
                style={{background:'none',border:'none',cursor:'pointer',color:'inherit',opacity:.5,fontSize:11,padding:0,lineHeight:1}}>↺</button>
            )}
          </div>
          <span className="hdr-meta">Powered by <b>Finnhub</b></span>
        </div>
      </header>
      <ToastStack toasts={toasts} onDismiss={id=>setToasts(t=>t.filter(x=>x.id!==id))}/>

      {/* Options chain modal */}
      {showOptionsModal&&selected&&(
        <OptionsChainModal
          symbol={selected.symbol}
          stockPrice={selected.price}
          strategy={strategy}
          onSelect={handleOptionSelect}
          onClose={()=>setShowOptionsModal(false)}
          onCall={handleApiCall}/>
      )}

      {/* ── Strategy bar ── */}
      <div className="strat-bar">
        {Object.entries(STRATS).map(([k,s])=>{
          const active=strategy===k;
          return(
            <button key={k} className={`sbtn${active?' active':''}`}
              onClick={()=>{setStrategy(k);setPriceRangeManual(false);setSelectedContract(null);}}
              style={{color:active?s.accent:'var(--t3)'}}>
              <span style={{fontSize:16}}>{s.icon}</span>
              <span style={{fontSize:13,fontWeight:700}}>{s.name}</span>
              <span className="stag" style={{background:s.tagBg,color:s.tagC}}>{s.tag}</span>
            </button>
          );
        })}
      </div>
      <div className="strat-desc">
        <span style={{fontWeight:600,color:st.accent}}>{st.name}:</span>{' '}{st.desc}
      </div>

      {/* ── Page ── */}
      <div className="page">

        {/* ── Sidebar ── */}
        <aside className="sidebar">

          {/* Stock Search */}
          <StockSearch
            onSelect={s=>{
              setSelected(s);
              setStrike(Math.round(s.price*.95));
              const{low,high}=autoRange(s.price,strategy);
              setPriceLow(low);
              setPriceHigh(high);
              setPriceRangeManual(false);
              setSelectedContract(null);
            }}
            selected={selected}
            onCall={handleApiCall}/>

          {/* Options contract selector */}
          {selected&&(
            <div className="card cp fu1">
              <div className="slabel">Option Contract</div>

              {/* Buy / Write toggle */}
              <div className="field" style={{marginBottom:10}}>
                <label className="flabel">Position Type</label>
                <select
                  value={contractAction}
                  onChange={e=>{
                    setContractAction(e.target.value);
                    // If contract already selected, re-derive strategy immediately
                    if(selectedContract){
                      const s=deriveStrategy(e.target.value,selectedContract.side);
                      setStrategy(s);
                      setPriceRangeManual(false);
                    }
                  }}
                  style={{
                    width:'100%',padding:'9px 12px',borderRadius:8,
                    border:'1.5px solid var(--brd)',background:'var(--white)',
                    color:'var(--t1)',fontFamily:'var(--font)',fontSize:13,
                    fontWeight:600,cursor:'pointer',outline:'none',
                  }}>
                  <option value="buy">Buy (Long)</option>
                  <option value="write">Write (Short / Sell)</option>
                </select>
                <div style={{fontSize:10.5,color:'var(--t3)',marginTop:4}}>
                  {contractAction==='buy'
                    ?'Buying the option — limited risk, unlimited potential'
                    :'Selling the option — collect premium, capped profit'}
                </div>
              </div>

              <button className="opt-select-btn" onClick={()=>setShowOptionsModal(true)}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
                </svg>
                {selectedContract?'Change Contract':'Select from Options Chain'}
              </button>
              <ContractBadge contract={selectedContract} onClear={()=>{setSelectedContract(null);}}/>
            </div>
          )}

          {/* Parameters */}
          <div className="card cp fu2">
            <div className="slabel">Parameters</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <PInput label="Strike Price"   value={strike}    onChange={setStrike}    prefix="$" step={.5}/>
              <PInput label="Option Premium" value={premium}   onChange={setPremium}   prefix="$" step={.05}/>
              <PInput label="Contracts"      value={contracts} onChange={setContracts} step={1}   min={1}/>
              <PInput label="Days to Expiry" value={dte}       onChange={setDte}       suffix="days" step={1} min={0}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div>
                  <PInput label="Impl. Vol" value={iv} onChange={setIv} suffix="%" step={0.1} min={0.1}/>
                  {selectedContract&&(
                    <div style={{fontSize:9.5,color:"var(--green)",marginTop:3,fontWeight:600}}>
                      {selectedContract.iv&&selectedContract.iv>0.005?"↑ From API":"↑ Back-calculated from market price"}
                    </div>
                  )}
                </div>
                <PInput label="Risk-Free" value={rfr} onChange={setRfr} suffix="%" step={.25}/>
              </div>
              <div style={{borderTop:"1px solid var(--brd-lt)",paddingTop:10,marginTop:2}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <span className="flabel">Price Range (Chart &amp; Table)</span>
                  {priceRangeManual&&sp>0&&(
                    <button onClick={()=>{setPriceRangeManual(false);const{low,high}=autoRange(sp,strategy);setPriceLow(low);setPriceHigh(high);}}
                      style={{fontSize:10,color:"var(--blue)",background:"none",border:"none",cursor:"pointer",fontWeight:600,padding:0}}>
                      ↺ Auto
                    </button>
                  )}
                  {!priceRangeManual&&<span style={{fontSize:9.5,color:"var(--green)",fontWeight:600}}>Auto</span>}
                </div>
                <div className="price-range-row">
                  <PInput label="Low $" value={priceLow}
                    onChange={v=>{setPriceLow(v);setPriceRangeManual(true);}}
                    prefix="$" step={.5} min={0.01}/>
                  <PInput label="High $" value={priceHigh}
                    onChange={v=>{setPriceHigh(v);setPriceRangeManual(true);}}
                    prefix="$" step={.5} min={0.01}/>
                </div>
              </div>
            </div>
          </div>

        </aside>

        {/* ── Main ── */}
        <main className="main-stack">

          {!selected?(
            <div className="empty">
              <div className="empty-icon">📈</div>
              <h2 className="empty-h">Analyze Any Options Strategy</h2>
              <p className="empty-p">
                Enter a stock ticker to instantly see P&L projections, Greeks, breakeven
                prices, and an interactive payoff diagram — powered by live market data.
              </p>
              <div className="step-list">
                {[
                  "Search for any US-listed stock or ETF by name or ticker",
                  "Choose a strategy — Long Call, Long Put, Covered Call, or Cash-Secured Put",
                  "Adjust parameters and read your P&L chart and Greeks instantly",
                ].map((step,i)=>(
                  <div key={i} className="step-row">
                    <div className="step-n">{i+1}</div>
                    {step}
                  </div>
                ))}
              </div>
            </div>
          ):summary&&(
            <>
              {/* Metrics */}
              <div className="metrics fu">
                {metrics.map((m,i)=>(
                  <div key={i} className="mc">
                    <div className="mc-bar" style={{background:m.bar}}/>
                    <div className="mc-label">{m.label}</div>
                    <div className="mc-val" style={{color:m.color}}>{m.val}</div>
                    <div className="mc-sub">{m.sub}</div>
                  </div>
                ))}
              </div>

              {/* Greeks */}
              {greeks&&(
                <div className="greeks fu1">
                  {greekDefs.map((g,i)=>(
                    <div key={i} className="gc">
                      <div className="gc-label" style={{color:g.c}}>{g.l}</div>
                      <div className="gc-val">{g.v}</div>
                      <div className="gc-hint">{g.hint}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* Chart / Heatmap */}
              <div className="card fu2">
                <div className="chart-hd">
                  <div>
                    <div className="chart-title">
                      P&L Over Time —{" "}
                      <span style={{color:st.accent}}>{st.name}</span>
                    </div>
                    <div className="chart-sub">
                      {chartView==="chart"
                        ?"Hover anywhere on the chart to inspect P&L at any stock price"
                        :"Color-coded P&L grid across price range × time slices. NOW row = current price."}
                      {" "}<span style={{color:"var(--amber)",fontSize:10.5,fontWeight:600}}>
                        Assumes constant IV — actual gains may be higher on large moves (vol expansion).
                      </span>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div className="view-toggle">
                      <button className={`vt-btn${chartView==="chart"?" active":""}`} onClick={()=>setChartView("chart")}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                        Chart
                      </button>
                      <button className={`vt-btn${chartView==="heatmap"?" active":""}`} onClick={()=>setChartView("heatmap")}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                        </svg>
                        P&L Table
                      </button>
                    </div>
                    <div className="chart-badge">{selected.symbol} @ ${sp.toFixed(2)}</div>
                  </div>
                </div>
                {chartView==="chart"?(
                  <div style={{padding:"14px 0 0"}}>
                    <PnLChart strategy={strategy} params={params} dte={dte}
                      minPrice={priceLow} maxPrice={priceHigh}/>
                  </div>
                ):(
                  <div style={{padding:"12px 0 4px"}}>
                    {priceLow>0&&priceHigh>priceLow?(
                      <HeatMapTable strategy={strategy} params={params} dte={dte}
                        minPrice={priceLow} maxPrice={priceHigh}/>
                    ):(
                      <div style={{padding:"40px 22px",textAlign:"center",color:"var(--t3)",fontSize:13}}>
                        Set a Low $ and High $ price range in the Parameters panel to generate the P&L table.
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Table */}
              <div className="card fu3">
                <div className="chart-hd">
                  <div>
                    <div className="chart-title">P&L at Expiration</div>
                    <div className="chart-sub">Intrinsic value only — time premium = $0</div>
                  </div>
                  <div style={{textAlign:"right",fontSize:11.5,color:"var(--t3)",fontFamily:"var(--mono)"}}>
                    Strike <span style={{color:st.accent,fontWeight:700}}>${strike.toFixed(2)}</span>
                    {" "}· {contracts} contract{contracts!==1?"s":""}
                    {" "}· ${(premium*n).toFixed(2)} total cost
                  </div>
                </div>
                <div style={{overflowX:"auto"}}>
                  <table className="etbl">
                    <thead>
                      <tr>
                        <th>Stock Price</th>
                        <th>P&L / Share</th>
                        <th>Total P&L</th>
                        <th>Return</th>
                      </tr>
                    </thead>
                    <tbody>
                      {(()=>{
                        const bearish=strategy==='long_put'||strategy==='covered_call';
                        // Bearish: deep below strike → only 3 above current
                        // Bullish: only 3 below current → deep above strike
                        const lo=bearish?Math.max(strike*0.68,0.01):Math.max(sp*0.91,0.01);
                        const hi=bearish?sp*1.12:strike*1.32;
                        const N=18;
                        const step=(hi-lo)/(N-1);
                        const basis=premium*n;
                        return Array.from({length:N},(_,i)=>{
                          const price=lo+step*i;
                          const total=pnl(strategy,params,price,0);
                          const ps=total/n;
                          const pct=basis>0?(total/basis)*100:0;
                          const isCur=Math.abs(price-sp)<step*.55;
                          const isStrike=Math.abs(price-strike)<step*.55;
                          return(
                            <tr key={i} className={isCur?"cur":""}>
                              <td>
                                ${price.toFixed(2)}
                                {isCur&&<span style={{marginLeft:8,fontSize:9.5,fontWeight:700,color:"var(--blue)",background:"var(--blue-bg)",border:"1px solid var(--blue-brd)",padding:"1px 6px",borderRadius:4,verticalAlign:"middle"}}>NOW</span>}
                                {isStrike&&!isCur&&<span style={{marginLeft:8,fontSize:9.5,fontWeight:700,color:"var(--amber)",background:"var(--amber-bg)",border:"1px solid var(--amber-brd)",padding:"1px 6px",borderRadius:4,verticalAlign:"middle"}}>STRIKE</span>}
                              </td>
                              <td className={ps>=0?"pos":"neg"}>{ps>=0?"+":""}{ps.toFixed(2)}</td>
                              <td className={total>=0?"pos":"neg"} style={{fontWeight:700}}>{total>=0?"+":""}${total.toFixed(2)}</td>
                              <td className={pct>=0?"pos":"neg"}>{pct>=0?"+":""}{pct.toFixed(1)}%</td>
                            </tr>
                          );
                        });
                      })()}
                    </tbody>
                  </table>
                </div>
              </div>

            </>
          )}

        </main>
      </div>

      {/* ── Footer ── */}
      <footer style={{
        borderTop:"1px solid var(--brd)",marginTop:16,padding:"20px 40px",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        background:"var(--white)",
      }}>
        <div style={{fontSize:12,color:"var(--t4)"}}>
          © 2026 OptionsLab · For educational purposes only. Not financial advice.
        </div>
        <div style={{fontSize:12,color:"var(--t4)"}}>
          Live data via{" "}
          <a href="https://finnhub.io" target="_blank" rel="noreferrer"
            style={{color:"var(--blue)",fontWeight:600,textDecoration:"none"}}>Finnhub</a>
          {" "}· Black-Scholes pricing model
        </div>
      </footer>

    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<OptionsLab/>);
</script>
</body>
</html>
